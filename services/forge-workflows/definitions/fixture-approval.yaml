name: fixture-approval
steps:
  - id: before
    type: log
    message: before-approval
  - id: approve-rollback
    type: approval
    prompt: "Approve rollback of ${event.deployment_id}?"
    on_deny: close
  - id: after-approve
    type: log
    message: after-approve
  - id: close
    type: log
    message: closed-denied
