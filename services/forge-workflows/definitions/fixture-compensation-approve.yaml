name: fixture-compensation-approve
steps:
  - id: apply-change
    type: task
    action: control.apply
    compensate: control.rollback_deployment
  - id: approve-rollback
    type: approval
    prompt: "Approve rollback of ${event.deployment_id}?"
    on_deny: close
  - id: do-rollback
    type: task
    action: rollback
  - id: finalize
    type: task
    action: report.store
  - id: close
    type: log
    message: closed-denied
