# Default forge-models registry (14.02+).
# local-embed-small → LocalEmbeddingAdapter (deterministic unless LOCAL_MODEL_PATH set).
# local-general → FakeAdapter placeholder until 14.04 inference.
models:
  - id: local-embed-small
    backend: local
    capabilities: [embed]
    embedding_dim: 384
  - id: local-general
    backend: fake
    capabilities: [generate, classify, summarize]
