openapi: 3.0.3
info:
  title: Forge Control API
  version: 0.1.0
  description: |
    Desired-state control plane. POST creates optionally accept Idempotency-Key.

    As of Identity step 09.06, `FORGE_AUTH_MODE` defaults to `enforce`. Product
    APIs under `/v1/projects`, `/v1/applications`, `/v1/services`, `/v1/deployments`,
    `/v1/environments`, and `/v1/databases` require `Authorization: Bearer <token>`
    introspected via Forge Identity. Unauthenticated → 401 (`unauthenticated`);
    authorized role insufficient → 403 (`forbidden` with `required_action` + `role`
    details). Set `FORGE_AUTH_MODE=dev` explicitly for the insecure local bypass
    (pre-09 demos).
servers: [{url: http://127.0.0.1:4001}]
security:
  - bearerAuth: []
paths:
  /v1/projects:
    get: {operationId: listProjects, responses: {'200': {$ref: '#/components/responses/Projects'}, '401': {$ref: '#/components/responses/Unauthenticated'}}}
    post: {$ref: '#/components/x-create-project'}
  /v1/projects/{projectId}:
    get: {$ref: '#/components/x-get-project'}
  /v1/projects/{projectId}/environments:
    get: {operationId: listEnvironments, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {$ref: '#/components/responses/Environments'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-environment'}
  /v1/environments/{environmentId}:
    get: {$ref: '#/components/x-get-environment'}
  /v1/projects/{projectId}/applications:
    get: {operationId: listApplications, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {$ref: '#/components/responses/Applications'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-application'}
  /v1/applications/{applicationId}:
    get: {$ref: '#/components/x-get-application'}
  /v1/applications/{applicationId}/services:
    get: {operationId: listServices, parameters: [{$ref: '#/components/parameters/ApplicationId'}], responses: {'200': {$ref: '#/components/responses/Services'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-service'}
  /v1/services/{serviceId}:
    get: {$ref: '#/components/x-get-service'}
  /v1/services/{serviceId}/image:
    post: {$ref: '#/components/x-record-service-image'}
  /v1/services/{serviceId}/deployments:
    get: {operationId: listDeployments, parameters: [{$ref: '#/components/parameters/ServiceId'}], responses: {'200': {$ref: '#/components/responses/Deployments'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-deployment'}
  /v1/deployments/{deploymentId}:
    get: {$ref: '#/components/x-get-deployment'}
    patch: {$ref: '#/components/x-update-deployment'}
    delete: {$ref: '#/components/x-delete-deployment'}
  /v1/deployments/{deploymentId}/status:
    post: {$ref: '#/components/x-report-deployment-status'}
  /v1/deployments/{deploymentId}/reconcile:
    get: {$ref: '#/components/x-get-reconcile-status'}
  /v1/deployments/{deploymentId}/history:
    get: {$ref: '#/components/x-get-deployment-history'}
  /v1/placements:
    post: {$ref: '#/components/x-create-placement'}
    get: {$ref: '#/components/x-list-placements'}
  /v1/nodes:
    get: {$ref: '#/components/x-list-nodes'}
  /v1/nodes/register:
    post: {$ref: '#/components/x-register-node'}
  /v1/nodes/{nodeId}/heartbeat:
    post: {$ref: '#/components/x-node-heartbeat'}
  /v1/databases/instances:
    get: {operationId: listDbInstances, parameters: [{name: projectId, in: query, required: false, schema: {$ref: '#/components/schemas/Uuid'}}, {name: X-Forge-Project, in: header, required: false, schema: {$ref: '#/components/schemas/Uuid'}}], responses: {'200': {$ref: '#/components/responses/DbInstances'}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-db-instance'}
  /v1/databases/instances/{instanceId}:
    get: {$ref: '#/components/x-get-db-instance'}
    patch: {$ref: '#/components/x-patch-db-instance'}
    delete: {$ref: '#/components/x-delete-db-instance'}
  /v1/databases/instances/{instanceId}/databases:
    get: {operationId: listDbDatabases, parameters: [{$ref: '#/components/parameters/InstanceId'}], responses: {'200': {$ref: '#/components/responses/DbDatabases'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-db-database'}
  /v1/databases/{databaseId}:
    get: {$ref: '#/components/x-get-db-database'}
    patch: {$ref: '#/components/x-patch-db-database'}
    delete: {$ref: '#/components/x-delete-db-database'}
  /v1/databases/{databaseId}/rotate-credentials:
    post: {$ref: '#/components/x-rotate-db-credentials'}
  /v1/databases/{databaseId}/attach:
    post: {$ref: '#/components/x-attach-db-database'}
  /v1/databases/{databaseId}/backups:
    get: {operationId: listDbBackups, parameters: [{$ref: '#/components/parameters/DatabaseId'}, {name: X-Forge-Project, in: header, required: true, schema: {$ref: '#/components/schemas/Uuid'}}], responses: {'200': {$ref: '#/components/responses/DbBackups'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-db-backup'}
  /v1/databases/{databaseId}/backups/{backupId}:
    get: {$ref: '#/components/x-get-db-backup'}
  /v1/databases/backups/{backupId}/restore:
    post: {$ref: '#/components/x-restore-db-backup'}
  /v1/databases/attachments/{attachmentId}:
    delete: {$ref: '#/components/x-detach-db-attachment'}
  /v1/applications/{applicationId}/databases:
    get: {operationId: listApplicationDatabases, parameters: [{$ref: '#/components/parameters/ApplicationId'}], responses: {'200': {$ref: '#/components/responses/DbAttachments'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Session or API token from Forge Identity (`forge_pat_` / `forge_sat_` / session token).
  parameters:
    ProjectId: {name: projectId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    ApplicationId: {name: applicationId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    ServiceId: {name: serviceId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    EnvironmentId: {name: environmentId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    DeploymentId: {name: deploymentId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    NodeId: {name: nodeId, in: path, required: true, schema: {type: string, minLength: 1}}
    InstanceId: {name: instanceId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    DatabaseId: {name: databaseId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    BackupId: {name: backupId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    AttachmentId: {name: attachmentId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    IdempotencyKey: {name: Idempotency-Key, in: header, schema: {type: string, pattern: '^[A-Za-z0-9._-]{1,128}$'}}
  responses:
    Error: {description: Canonical error response, headers: {X-Request-Id: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Unauthenticated:
      description: Missing or inactive bearer token
      headers: {X-Request-Id: {schema: {type: string}}}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorEnvelope'}
          example: {error: {code: unauthenticated, message: missing Authorization bearer token, requestId: req_1}}
    Forbidden:
      description: Authenticated but role cannot perform the required action
      headers: {X-Request-Id: {schema: {type: string}}}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorEnvelope'}
          example: {error: {code: forbidden, message: forbidden, requestId: req_1, details: {required_action: deployment.create, role: viewer}}}
    Projects: {description: Projects, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Project'}}}}}
    Environments: {description: Environments, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Environment'}}}}}
    Applications: {description: Applications, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Application'}}}}}
    Services: {description: Services, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Service'}}}}}
    Deployments: {description: Deployments, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Deployment'}}}}}
    DbInstances: {description: Managed database instances, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/DbInstance'}}}}}
    DbDatabases: {description: Databases on an instance, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/DbDatabase'}}}}}
    DbAttachments: {description: Managed database attachments for an application, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/DbAttachment'}}}}}
    DbBackups: {description: On-demand backups for a managed database, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/DbBackup'}}}}}
  schemas:
    Uuid: {type: string, format: uuid}
    ErrorEnvelope: {type: object, required: [error], properties: {error: {type: object, required: [code, message, requestId], properties: {code: {type: string}, message: {type: string}, requestId: {type: string}, details: {type: object, additionalProperties: {type: string}}}}}}
    Project: {type: object, required: [id, name, slug, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, slug: {type: string}, createdAt: {type: string, format: date-time}, updatedAt: {type: string, format: date-time}}}
    Environment: {type: object, required: [id, projectId, name, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, projectId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    Application: {type: object, required: [id, projectId, name, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, projectId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    Service: {type: object, required: [id, applicationId, name, port, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, applicationId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, port: {type: integer, minimum: 1, maximum: 65535}, createdAt: {type: string}, updatedAt: {type: string}, image: {type: string}, imageDigest: {type: string}, imageCommit: {type: string}, imageBuildId: {type: string}}}
    Deployment: {type: object, required: [id, serviceId, environmentId, image, desiredReplicas, status, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, serviceId: {$ref: '#/components/schemas/Uuid'}, environmentId: {$ref: '#/components/schemas/Uuid'}, image: {type: string}, desiredReplicas: {type: integer, minimum: 0}, status: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    ReplicaStatus: {type: string, enum: [pending, running, ready, failed, stopped]}
    DeploymentEvent: {type: object, required: [at, from, to], properties: {at: {type: string, format: date-time}, from: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, to: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, image: {type: string}, desiredReplicas: {type: integer}, actualReplicas: {type: integer}, reason: {type: string}}}
    DeploymentHistory: {type: object, required: [deploymentId, events], properties: {deploymentId: {$ref: '#/components/schemas/Uuid'}, events: {type: array, items: {$ref: '#/components/schemas/DeploymentEvent'}}}}
    ReconcileStatus: {type: object, required: [deploymentId, desired, actual, plan, controllerHealthy], properties: {deploymentId: {$ref: '#/components/schemas/Uuid'}, desired: {type: object, required: [image, replicas, rollout], properties: {image: {type: string}, replicas: {type: integer, minimum: 0}, rollout: {type: object, required: [batchSize, timeoutSeconds], properties: {batchSize: {type: integer, minimum: 1}, timeoutSeconds: {type: integer, minimum: 1}}}}}, actual: {type: object, required: [replicas], properties: {replicas: {type: array, items: {type: object, required: [replicaId, status], properties: {replicaId: {type: string}, status: {$ref: '#/components/schemas/ReplicaStatus'}, image: {type: string}}}}}}, plan: {type: array, items: {type: object, required: [action, reason], properties: {action: {type: string, enum: [StartReplica, StopReplica, WaitReady, ShiftTraffic, DrainReplica, NoOp]}, reason: {type: string}, replicaId: {type: string}}}}, lastRunAt: {type: string, format: date-time, nullable: true}, controllerHealthy: {type: boolean}, phase: {type: string, enum: [idle, converging, rolling, degraded]}, updatedReplicas: {type: string}, currentImage: {type: string}, targetImage: {type: string}, status: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, lastHealthyImage: {type: string, nullable: true}}}
    Placement: {type: object, required: [placement_id, deployment_id, replica_index, status], properties: {placement_id: {type: string}, deployment_id: {$ref: '#/components/schemas/Uuid'}, replica_index: {type: integer, minimum: 0}, node_id: {type: string, nullable: true}, strategy: {type: string, enum: [single-node, first-fit, least-allocated, pending]}, reason: {type: string}, status: {type: string, enum: [placed, pending, lost]}, anti_affinity: {type: string, enum: [soft, hard]}, rescheduled_from_node: {type: string, nullable: true}}}
    NodeCapacity: {type: object, required: [slots], properties: {slots: {type: integer, minimum: 1}, cpu_millis: {type: integer, minimum: 0}, mem_mb: {type: integer, minimum: 0}}}
    NodeResources: {type: object, properties: {slots: {type: integer, minimum: 0}, cpu_millis: {type: integer, minimum: 0}, mem_mb: {type: integer, minimum: 0}}}
    FleetNode: {type: object, required: [id, address, status, capacity, allocated, free, last_heartbeat_at, registered_at], properties: {id: {type: string}, address: {type: string}, status: {type: string, enum: [online, offline, draining]}, capacity: {$ref: '#/components/schemas/NodeCapacity'}, allocated: {$ref: '#/components/schemas/NodeResources'}, free: {$ref: '#/components/schemas/NodeResources'}, running_replicas: {type: array, items: {type: string}}, last_heartbeat_at: {type: string, format: date-time}, registered_at: {type: string, format: date-time}}}
    DbInstanceStatus: {type: string, enum: [provisioning, available, error, deleting]}
    DbDatabaseStatus: {type: string, enum: [provisioning, available, error]}
    DbInstance: {type: object, required: [id, projectId, name, status, engine, deletionProtection, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, projectId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, status: {$ref: '#/components/schemas/DbInstanceStatus'}, engine: {type: string}, deletionProtection: {type: boolean}, statusReason: {type: string}, endpointRef: {type: string}, host: {type: string}, port: {type: integer, minimum: 1, maximum: 65535}, containerId: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    DbDatabase: {type: object, required: [id, instanceId, name, status, deletionProtection, createdAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, instanceId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, status: {$ref: '#/components/schemas/DbDatabaseStatus'}, statusReason: {type: string}, deletionProtection: {type: boolean}, host: {type: string}, port: {type: integer, minimum: 1, maximum: 65535}, secretRef: {type: string, description: Secrets reference only — never a plaintext password}, username: {type: string}, password: {type: string, description: One-time reveal on create only; omitted from list/get}, createdAt: {type: string}}}
    DbRotatedCredential: {type: object, required: [id, username, password, status, createdAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, username: {type: string}, password: {type: string, description: One-time reveal on rotate only}, status: {type: string}, secretRef: {type: string}, createdAt: {type: string}, rotatedAt: {type: string}}}
    RotateCredentialsResponse: {type: object, required: [credential, secretRef], properties: {credential: {$ref: '#/components/schemas/DbRotatedCredential'}, secretRef: {type: string, description: Secrets reference for the new password}}}
    DbAttachment: {type: object, required: [id, databaseId, applicationId, envVar, createdAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, databaseId: {$ref: '#/components/schemas/Uuid'}, applicationId: {$ref: '#/components/schemas/Uuid'}, envVar: {type: string, description: Workload env var name (default DATABASE_URL)}, secretRef: {type: string, description: Secrets reference for the composed connection URL — never plaintext}, createdAt: {type: string}}}
    DbBackupStatus: {type: string, enum: [pending, running, succeeded, failed]}
    DbRestoreStatus: {type: string, enum: [running, succeeded, failed]}
    DbBackup: {type: object, required: [id, databaseId, status, createdAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, databaseId: {$ref: '#/components/schemas/Uuid'}, status: {$ref: '#/components/schemas/DbBackupStatus'}, location: {type: string}, checksum: {type: string, description: SHA-256 hex of the archive}, sizeBytes: {type: integer, minimum: 0}, statusReason: {type: string}, completedAt: {type: string}, restoreStatus: {$ref: '#/components/schemas/DbRestoreStatus'}, restoreTargetDatabaseId: {$ref: '#/components/schemas/Uuid'}, restoreStatusReason: {type: string}, restoreCompletedAt: {type: string}, createdAt: {type: string}}}
    DbRestore: {type: object, required: [backupId, targetDatabaseId, status], properties: {backupId: {$ref: '#/components/schemas/Uuid'}, targetDatabaseId: {$ref: '#/components/schemas/Uuid'}, status: {$ref: '#/components/schemas/DbRestoreStatus'}, statusReason: {type: string}}}
  x-create-project: {operationId: createProject, parameters: [{$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}, slug: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-environment: {operationId: createEnvironment, parameters: [{$ref: '#/components/parameters/ProjectId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Environment'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-application: {operationId: createApplication, parameters: [{$ref: '#/components/parameters/ProjectId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-service: {operationId: createService, parameters: [{$ref: '#/components/parameters/ApplicationId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name, port], properties: {name: {type: string}, port: {type: integer}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-record-service-image: {operationId: recordServiceImage, parameters: [{$ref: '#/components/parameters/ServiceId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [image], properties: {image: {type: string}, digest: {type: string}, commit: {type: string}, buildId: {type: string}}}}}}, responses: {'200': {description: Service with recorded image, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-deployment: {operationId: createDeployment, parameters: [{$ref: '#/components/parameters/ServiceId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [image, environmentId], properties: {image: {type: string}, environmentId: {$ref: '#/components/schemas/Uuid'}, desiredReplicas: {type: integer}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-get-project: {operationId: getProject, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {description: Project, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-environment: {operationId: getEnvironment, parameters: [{$ref: '#/components/parameters/EnvironmentId'}], responses: {'200': {description: Environment, content: {application/json: {schema: {$ref: '#/components/schemas/Environment'}}}}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-application: {operationId: getApplication, parameters: [{$ref: '#/components/parameters/ApplicationId'}], responses: {'200': {description: Application, content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-service: {operationId: getService, parameters: [{$ref: '#/components/parameters/ServiceId'}], responses: {'200': {description: Service, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-deployment: {operationId: getDeployment, parameters: [{$ref: '#/components/parameters/DeploymentId'}], responses: {'200': {description: Deployment, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
  x-update-deployment: {operationId: updateDeployment, parameters: [{$ref: '#/components/parameters/DeploymentId'}], requestBody: {required: true, content: {application/json: {schema: {type: object, properties: {image: {type: string}, desiredReplicas: {type: integer, minimum: 0}}, minProperties: 1}}}}, responses: {'200': {description: Updated desired state, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '400': {$ref: '#/components/responses/Error'}, '401': {$ref: '#/components/responses/Unauthenticated'}, '403': {$ref: '#/components/responses/Forbidden'}, '404': {$ref: '#/components/responses/Error'}}}
