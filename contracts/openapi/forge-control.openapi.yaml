openapi: 3.0.3
info:
  title: Forge Control API
  version: 0.1.0
  description: Desired-state control plane. POST creates optionally accept Idempotency-Key.
servers: [{url: http://127.0.0.1:4001}]
paths:
  /v1/projects:
    get: {operationId: listProjects, responses: {'200': {$ref: '#/components/responses/Projects'}}}
    post: {$ref: '#/components/x-create-project'}
  /v1/projects/{projectId}:
    get: {$ref: '#/components/x-get-project'}
  /v1/projects/{projectId}/environments:
    get: {operationId: listEnvironments, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {$ref: '#/components/responses/Environments'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-environment'}
  /v1/environments/{environmentId}:
    get: {$ref: '#/components/x-get-environment'}
  /v1/projects/{projectId}/applications:
    get: {operationId: listApplications, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {$ref: '#/components/responses/Applications'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-application'}
  /v1/applications/{applicationId}:
    get: {$ref: '#/components/x-get-application'}
  /v1/applications/{applicationId}/services:
    get: {operationId: listServices, parameters: [{$ref: '#/components/parameters/ApplicationId'}], responses: {'200': {$ref: '#/components/responses/Services'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-service'}
  /v1/services/{serviceId}:
    get: {$ref: '#/components/x-get-service'}
  /v1/services/{serviceId}/image:
    post: {$ref: '#/components/x-record-service-image'}
  /v1/services/{serviceId}/deployments:
    get: {operationId: listDeployments, parameters: [{$ref: '#/components/parameters/ServiceId'}], responses: {'200': {$ref: '#/components/responses/Deployments'}, '404': {$ref: '#/components/responses/Error'}}}
    post: {$ref: '#/components/x-create-deployment'}
  /v1/deployments/{deploymentId}:
    get: {$ref: '#/components/x-get-deployment'}
    patch: {$ref: '#/components/x-update-deployment'}
    delete: {$ref: '#/components/x-delete-deployment'}
  /v1/deployments/{deploymentId}/status:
    post: {$ref: '#/components/x-report-deployment-status'}
  /v1/deployments/{deploymentId}/reconcile:
    get: {$ref: '#/components/x-get-reconcile-status'}
  /v1/deployments/{deploymentId}/history:
    get: {$ref: '#/components/x-get-deployment-history'}
  /v1/placements:
    post: {$ref: '#/components/x-create-placement'}
    get: {$ref: '#/components/x-list-placements'}
  /v1/nodes:
    get: {$ref: '#/components/x-list-nodes'}
  /v1/nodes/register:
    post: {$ref: '#/components/x-register-node'}
  /v1/nodes/{nodeId}/heartbeat:
    post: {$ref: '#/components/x-node-heartbeat'}
components:
  parameters:
    ProjectId: {name: projectId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    ApplicationId: {name: applicationId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    ServiceId: {name: serviceId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    EnvironmentId: {name: environmentId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    DeploymentId: {name: deploymentId, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}
    NodeId: {name: nodeId, in: path, required: true, schema: {type: string, minLength: 1}}
    IdempotencyKey: {name: Idempotency-Key, in: header, schema: {type: string, pattern: '^[A-Za-z0-9._-]{1,128}$'}}
  responses:
    Error: {description: Canonical error response, headers: {X-Request-Id: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
    Projects: {description: Projects, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Project'}}}}}
    Environments: {description: Environments, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Environment'}}}}}
    Applications: {description: Applications, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Application'}}}}}
    Services: {description: Services, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Service'}}}}}
    Deployments: {description: Deployments, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Deployment'}}}}}
  schemas:
    Uuid: {type: string, format: uuid}
    ErrorEnvelope: {type: object, required: [error], properties: {error: {type: object, required: [code, message, requestId], properties: {code: {type: string}, message: {type: string}, requestId: {type: string}, details: {type: object, additionalProperties: {type: string}}}}}}
    Project: {type: object, required: [id, name, slug, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, slug: {type: string}, createdAt: {type: string, format: date-time}, updatedAt: {type: string, format: date-time}}}
    Environment: {type: object, required: [id, projectId, name, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, projectId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    Application: {type: object, required: [id, projectId, name, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, projectId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    Service: {type: object, required: [id, applicationId, name, port, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, applicationId: {$ref: '#/components/schemas/Uuid'}, name: {type: string}, port: {type: integer, minimum: 1, maximum: 65535}, createdAt: {type: string}, updatedAt: {type: string}, image: {type: string}, imageDigest: {type: string}, imageCommit: {type: string}, imageBuildId: {type: string}}}
    Deployment: {type: object, required: [id, serviceId, environmentId, image, desiredReplicas, status, createdAt, updatedAt], properties: {id: {$ref: '#/components/schemas/Uuid'}, serviceId: {$ref: '#/components/schemas/Uuid'}, environmentId: {$ref: '#/components/schemas/Uuid'}, image: {type: string}, desiredReplicas: {type: integer, minimum: 0}, status: {type: string}, createdAt: {type: string}, updatedAt: {type: string}}}
    ReplicaStatus: {type: string, enum: [pending, running, ready, failed, stopped]}
    DeploymentEvent: {type: object, required: [at, from, to], properties: {at: {type: string, format: date-time}, from: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, to: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, image: {type: string}, desiredReplicas: {type: integer}, actualReplicas: {type: integer}, reason: {type: string}}}
    DeploymentHistory: {type: object, required: [deploymentId, events], properties: {deploymentId: {$ref: '#/components/schemas/Uuid'}, events: {type: array, items: {$ref: '#/components/schemas/DeploymentEvent'}}}}
    ReconcileStatus: {type: object, required: [deploymentId, desired, actual, plan, controllerHealthy], properties: {deploymentId: {$ref: '#/components/schemas/Uuid'}, desired: {type: object, required: [image, replicas, rollout], properties: {image: {type: string}, replicas: {type: integer, minimum: 0}, rollout: {type: object, required: [batchSize, timeoutSeconds], properties: {batchSize: {type: integer, minimum: 1}, timeoutSeconds: {type: integer, minimum: 1}}}}}, actual: {type: object, required: [replicas], properties: {replicas: {type: array, items: {type: object, required: [replicaId, status], properties: {replicaId: {type: string}, status: {$ref: '#/components/schemas/ReplicaStatus'}, image: {type: string}}}}}}, plan: {type: array, items: {type: object, required: [action, reason], properties: {action: {type: string, enum: [StartReplica, StopReplica, WaitReady, ShiftTraffic, DrainReplica, NoOp]}, reason: {type: string}, replicaId: {type: string}}}}, lastRunAt: {type: string, format: date-time, nullable: true}, controllerHealthy: {type: boolean}, phase: {type: string, enum: [idle, converging, rolling, degraded]}, updatedReplicas: {type: string}, currentImage: {type: string}, targetImage: {type: string}, status: {type: string, enum: [pending, deploying, deployed, rolling_back, rolled_back, failed]}, lastHealthyImage: {type: string, nullable: true}}}
    Placement: {type: object, required: [placement_id, deployment_id, replica_index, status], properties: {placement_id: {type: string}, deployment_id: {$ref: '#/components/schemas/Uuid'}, replica_index: {type: integer, minimum: 0}, node_id: {type: string, nullable: true}, strategy: {type: string, enum: [single-node, first-fit, least-allocated, pending]}, reason: {type: string}, status: {type: string, enum: [placed, pending, lost]}, anti_affinity: {type: string, enum: [soft, hard]}, rescheduled_from_node: {type: string, nullable: true}}}
    NodeCapacity: {type: object, required: [slots], properties: {slots: {type: integer, minimum: 1}, cpu_millis: {type: integer, minimum: 0}, mem_mb: {type: integer, minimum: 0}}}
    NodeResources: {type: object, properties: {slots: {type: integer, minimum: 0}, cpu_millis: {type: integer, minimum: 0}, mem_mb: {type: integer, minimum: 0}}}
    FleetNode: {type: object, required: [id, address, status, capacity, allocated, free, last_heartbeat_at, registered_at], properties: {id: {type: string}, address: {type: string}, status: {type: string, enum: [online, offline, draining]}, capacity: {$ref: '#/components/schemas/NodeCapacity'}, allocated: {$ref: '#/components/schemas/NodeResources'}, free: {$ref: '#/components/schemas/NodeResources'}, running_replicas: {type: array, items: {type: string}}, last_heartbeat_at: {type: string, format: date-time}, registered_at: {type: string, format: date-time}}}
  x-create-project: {operationId: createProject, parameters: [{$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}, slug: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '400': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-environment: {operationId: createEnvironment, parameters: [{$ref: '#/components/parameters/ProjectId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Environment'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-application: {operationId: createApplication, parameters: [{$ref: '#/components/parameters/ProjectId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name], properties: {name: {type: string}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-service: {operationId: createService, parameters: [{$ref: '#/components/parameters/ApplicationId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [name, port], properties: {name: {type: string}, port: {type: integer}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-record-service-image: {operationId: recordServiceImage, parameters: [{$ref: '#/components/parameters/ServiceId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [image], properties: {image: {type: string}, digest: {type: string}, commit: {type: string}, buildId: {type: string}}}}}}, responses: {'200': {description: Service with recorded image, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-create-deployment: {operationId: createDeployment, parameters: [{$ref: '#/components/parameters/ServiceId'}, {$ref: '#/components/parameters/IdempotencyKey'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [image, environmentId], properties: {image: {type: string}, environmentId: {$ref: '#/components/schemas/Uuid'}, desiredReplicas: {type: integer}}}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-get-project: {operationId: getProject, parameters: [{$ref: '#/components/parameters/ProjectId'}], responses: {'200': {description: Project, content: {application/json: {schema: {$ref: '#/components/schemas/Project'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-environment: {operationId: getEnvironment, parameters: [{$ref: '#/components/parameters/EnvironmentId'}], responses: {'200': {description: Environment, content: {application/json: {schema: {$ref: '#/components/schemas/Environment'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-application: {operationId: getApplication, parameters: [{$ref: '#/components/parameters/ApplicationId'}], responses: {'200': {description: Application, content: {application/json: {schema: {$ref: '#/components/schemas/Application'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-service: {operationId: getService, parameters: [{$ref: '#/components/parameters/ServiceId'}], responses: {'200': {description: Service, content: {application/json: {schema: {$ref: '#/components/schemas/Service'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-deployment: {operationId: getDeployment, parameters: [{$ref: '#/components/parameters/DeploymentId'}], responses: {'200': {description: Deployment, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-update-deployment: {operationId: updateDeployment, parameters: [{$ref: '#/components/parameters/DeploymentId'}], requestBody: {required: true, content: {application/json: {schema: {type: object, properties: {image: {type: string}, desiredReplicas: {type: integer, minimum: 0}}, minProperties: 1}}}}, responses: {'200': {description: Updated desired state, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}}
  x-delete-deployment: {operationId: deleteDeployment, parameters: [{$ref: '#/components/parameters/DeploymentId'}], responses: {'204': {description: Deleted}, '404': {$ref: '#/components/responses/Error'}}}
  x-report-deployment-status: {operationId: reportDeploymentStatus, parameters: [{$ref: '#/components/parameters/DeploymentId'}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [status, nodeId], properties: {status: {type: string, enum: [pending, active, failed, stopped]}, nodeId: {type: string}, endpoint: {type: object, properties: {hostPort: {type: integer, minimum: 1, maximum: 65535}}}}}}}}, responses: {'200': {description: Updated deployment, content: {application/json: {schema: {$ref: '#/components/schemas/Deployment'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-reconcile-status: {operationId: getReconcileStatus, parameters: [{$ref: '#/components/parameters/DeploymentId'}], responses: {'200': {description: Desired/actual reconcile snapshot, content: {application/json: {schema: {$ref: '#/components/schemas/ReconcileStatus'}, example: {deploymentId: '11111111-1111-1111-1111-111111111111', desired: {image: 'registry.local/demo:v2', replicas: 2, rollout: {batchSize: 1, timeoutSeconds: 120}}, actual: {replicas: [{replicaId: '0', status: ready, image: 'registry.local/demo:v1'}, {replicaId: '2', status: ready, image: 'registry.local/demo:v2'}]}, plan: [{action: ShiftTraffic, reason: 'rolling shift to image=registry.local/demo:v2', replicaId: '2'}], lastRunAt: '2026-07-22T14:00:00Z', controllerHealthy: true, phase: rolling, updatedReplicas: '1/2', currentImage: 'registry.local/demo:v1', targetImage: 'registry.local/demo:v2', status: deploying, lastHealthyImage: 'registry.local/demo:v1'}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-get-deployment-history: {operationId: getDeploymentHistory, parameters: [{$ref: '#/components/parameters/DeploymentId'}], responses: {'200': {description: Chronological deployment status transitions, content: {application/json: {schema: {$ref: '#/components/schemas/DeploymentHistory'}, example: {deploymentId: '11111111-1111-1111-1111-111111111111', events: [{at: '2026-07-22T14:00:00Z', from: pending, to: deploying, image: 'registry.local/demo:v2', desiredReplicas: 2, actualReplicas: 2, reason: 'rollout started'}, {at: '2026-07-22T14:00:20Z', from: deploying, to: deployed, image: 'registry.local/demo:v2', desiredReplicas: 2, actualReplicas: 2, reason: 'all replicas ready'}]}}}}, '404': {$ref: '#/components/responses/Error'}}}
  x-create-placement: {operationId: createPlacement, requestBody: {required: true, content: {application/json: {schema: {type: object, required: [deployment_id, replica_index], properties: {deployment_id: {$ref: '#/components/schemas/Uuid'}, replica_index: {type: integer, minimum: 0}, requirements: {type: object, properties: {slots: {type: integer, minimum: 1}}}, anti_affinity: {type: string, enum: [soft, hard]}, service_id: {type: string}}}, example: {deployment_id: '11111111-1111-1111-1111-111111111111', replica_index: 0, requirements: {slots: 1}, anti_affinity: soft}}}}, responses: {'201': {description: Placement computed and persisted, content: {application/json: {schema: {$ref: '#/components/schemas/Placement'}, example: {placement_id: plc_1, deployment_id: '11111111-1111-1111-1111-111111111111', replica_index: 0, node_id: node-b, strategy: least-allocated, reason: 'least-allocated: node-b free=4', status: placed, anti_affinity: soft}}}}, '200': {description: Existing placement returned (idempotent), content: {application/json: {schema: {$ref: '#/components/schemas/Placement'}}}}, '202': {description: Placement queued pending capacity, content: {application/json: {schema: {$ref: '#/components/schemas/Placement'}, example: {placement_id: plc_2, deployment_id: '11111111-1111-1111-1111-111111111111', replica_index: 4, status: pending, reason: 'no node with 1 free slot', anti_affinity: soft}}}}, '400': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}}
  x-list-placements: {operationId: listPlacements, parameters: [{name: deployment, in: query, required: true, schema: {$ref: '#/components/schemas/Uuid'}}, {name: status, in: query, required: false, schema: {type: string, enum: [placed, pending, lost]}}], responses: {'200': {description: Placements for a deployment, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Placement'}}, example: [{placement_id: plc_1, deployment_id: '11111111-1111-1111-1111-111111111111', replica_index: 0, node_id: node-b, strategy: least-allocated, reason: 'least-allocated: node-b free=4', status: placed, anti_affinity: soft}]}}}, '400': {$ref: '#/components/responses/Error'}}}
  x-list-nodes: {operationId: listNodes, responses: {'200': {description: Fleet nodes with capacity, allocation, and liveness, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/FleetNode'}}, example: [{id: node-a, address: 'http://runtime-a:4102', status: online, capacity: {slots: 4, cpu_millis: 4000, mem_mb: 4096}, allocated: {slots: 2}, free: {slots: 2}, running_replicas: ['dpl_1:0', 'dpl_1:1'], last_heartbeat_at: '2026-07-22T14:00:00Z', registered_at: '2026-07-22T13:00:00Z'}]}}}}}
  x-register-node: {operationId: registerNode, requestBody: {required: true, content: {application/json: {schema: {type: object, required: [node_id, address, capacity], properties: {node_id: {type: string, minLength: 1}, address: {type: string, minLength: 1}, capacity: {$ref: '#/components/schemas/NodeCapacity'}}}, example: {node_id: node-a, address: 'http://runtime-a:4102', capacity: {slots: 4, cpu_millis: 4000, mem_mb: 4096}}}}}, responses: {'201': {description: Node registered, content: {application/json: {schema: {$ref: '#/components/schemas/FleetNode'}}}}, '200': {description: Existing node updated (idempotent), content: {application/json: {schema: {$ref: '#/components/schemas/FleetNode'}}}}, '400': {$ref: '#/components/responses/Error'}}}
  x-node-heartbeat: {operationId: nodeHeartbeat, parameters: [{$ref: '#/components/parameters/NodeId'}], requestBody: {required: true, content: {application/json: {schema: {type: object, properties: {allocated: {$ref: '#/components/schemas/NodeResources'}, free: {$ref: '#/components/schemas/NodeResources'}, running_replicas: {type: array, items: {type: string}}}}, example: {allocated: {slots: 2}, free: {slots: 2}, running_replicas: ['dpl_1:0', 'dpl_1:1']}}}}, responses: {'200': {description: Heartbeat accepted, content: {application/json: {schema: {$ref: '#/components/schemas/FleetNode'}}}}, '400': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}}
