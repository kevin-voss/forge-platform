openapi: 3.0.3
info:
  title: Forge Models API
  version: 0.4.0
  description: |
    Platform model-serving service (epic 14). Health/identity from 14.01;
    model registry read APIs from 14.02; local embeddings (`POST .../embed`)
    from 14.03; generate/classify/summarize from 14.04. Streaming, async jobs,
    and usage metrics land in later steps.
servers:
  - url: http://127.0.0.1:4300
    description: Local Compose (host port 4300)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when configuration parsed successfully, backend
        selection (`FORGE_MODELS_BACKEND`) was validated, and the model
        registry loaded at startup; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-models
                language: python
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/models:
    get:
      operationId: listModels
      summary: List registered models
      description: |
        Returns the in-memory model registry loaded from `models.yaml`
        (`FORGE_MODELS_CONFIG`). Each entry includes capabilities, backend,
        optional embedding dimension, and current adapter health status.
      responses:
        "200":
          description: Registry listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
              example:
                models:
                  - id: local-embed-small
                    capabilities: [embed]
                    backend: local
                    embedding_dim: 384
                    status: ok
                  - id: local-general
                    capabilities: [classify, generate, summarize]
                    backend: fake
                    embedding_dim: null
                    status: ok

  /v1/models/{model}:
    get:
      operationId: getModel
      summary: Get a registered model
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Model registry entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
              example:
                id: local-embed-small
                capabilities: [embed]
                backend: local
                embedding_dim: 384
                status: ok
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found

  /v1/models/{model}/health:
    get:
      operationId: getModelHealth
      summary: Per-model adapter health
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Adapter health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelHealth"
              example:
                status: ok
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found

  /v1/models/{model}/embed:
    post:
      operationId: embedModel
      summary: Embed text with a registered model
      description: |
        Produces fixed-dimension L2-normalized embedding vectors from a fully
        local backend. CI uses a deterministic hash-based embedder (no external
        API). When `FORGE_MODELS_LOCAL_MODEL_PATH` is set for a `local` backend
        model, an on-disk sentence-transformer may be used instead.
        `input` may be a single string or a batch (capped by
        `FORGE_MODELS_EMBED_MAX_BATCH`, default 64). Each input is capped by
        `FORGE_MODELS_EMBED_MAX_CHARS` (default 8192).
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbedRequest"
            examples:
              single:
                value:
                  input: hello forge
              batch:
                value:
                  input: [hello, forge]
      responses:
        "200":
          description: Embedding vectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbedResponse"
              example:
                model: local-embed-small
                embeddings:
                  - [0.01, -0.02]
                dim: 384
                usage:
                  input_count: 1
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found
        "422":
          description: |
            Invalid input, batch too large, or model lacks the `embed` capability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              examples:
                capability_unsupported:
                  value:
                    error: "model 'local-general' does not support embed"
                    code: capability_unsupported
                batch_too_large:
                  value:
                    error: "batch size 100 exceeds max 64"
                    code: batch_too_large
                invalid_input:
                  value:
                    error: "input[0] must be a non-empty string"
                    code: invalid_input

  /v1/models/{model}/generate:
    post:
      operationId: generateModel
      summary: Generate text with a registered model
      description: |
        Synchronous text generation via the local/fake generation adapter.
        At `temperature=0` (default) output is deterministic for CI.
        `max_tokens` is capped by `FORGE_MODELS_GEN_MAX_TOKENS` (default 512).
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
            example:
              prompt: "summarize: forge platform"
              max_tokens: 32
              temperature: 0
      responses:
        "200":
          description: Generated text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
              example:
                text: "[forge-gen] summarize: forge platform"
                finish_reason: stop
                usage:
                  prompt_tokens: 3
                  completion_tokens: 4
                  total_tokens: 7
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found
        "422":
          description: |
            Invalid params, max_tokens over cap, or model lacks `generate`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              examples:
                capability_unsupported:
                  value:
                    error: "model 'local-embed-small' does not support generate"
                    code: capability_unsupported
                invalid_params:
                  value:
                    error: "max_tokens 9999 exceeds cap 512"
                    code: invalid_params

  /v1/models/{model}/classify:
    post:
      operationId: classifyModel
      summary: Classify text against candidate labels
      description: |
        Scores each label by cosine similarity of deterministic embeddings
        against the input. Results are sorted by score descending. Label list
        size is capped by `FORGE_MODELS_CLASSIFY_MAX_LABELS` (default 32).
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
            example:
              input: database connection refused
              labels: [network, auth, disk]
      responses:
        "200":
          description: Scored labels (sorted descending by score)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"
              example:
                labels:
                  - label: network
                    score: 0.72
                  - label: disk
                    score: 0.51
                  - label: auth
                    score: 0.48
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found
        "422":
          description: |
            Empty/invalid labels, label list too large, or model lacks `classify`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              examples:
                capability_unsupported:
                  value:
                    error: "model 'local-embed-small' does not support classify"
                    code: capability_unsupported
                invalid_params:
                  value:
                    error: "labels must be a non-empty list"
                    code: invalid_params

  /v1/models/{model}/summarize:
    post:
      operationId: summarizeModel
      summary: Summarize text with a registered model
      description: |
        Thin wrapper over generate that builds a summarization prompt and
        returns `{ summary, usage }`. Deterministic at `temperature=0`.
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeRequest"
            example:
              input: long incident text about database connection refused ...
      responses:
        "200":
          description: Summary text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeResponse"
              example:
                summary: "[forge-summary] long incident text about"
                usage:
                  prompt_tokens: 12
                  completion_tokens: 5
                  total_tokens: 17
        "404":
          description: Unknown model id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "model not found: nope"
                code: model_not_found
        "422":
          description: |
            Invalid params or model lacks the `summarize` capability.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              examples:
                capability_unsupported:
                  value:
                    error: "model 'local-embed-small' does not support summarize"
                    code: capability_unsupported
                invalid_params:
                  value:
                    error: "input must be a non-empty string"
                    code: invalid_params

components:
  parameters:
    ModelId:
      name: model
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Registry model identifier

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required:
        - status
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-models
        language:
          type: string
          example: python
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          example: 12.5

    ModelCapability:
      type: string
      enum: [embed, generate, classify, summarize]

    ModelStatus:
      type: string
      enum: [ok, degraded, down]

    Model:
      type: object
      additionalProperties: false
      required:
        - id
        - capabilities
        - backend
        - embedding_dim
        - status
      properties:
        id:
          type: string
          example: local-embed-small
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/ModelCapability"
          uniqueItems: true
        backend:
          type: string
          example: local
        embedding_dim:
          type: integer
          minimum: 1
          nullable: true
          description: Fixed embedding dimension; null when embed is unsupported
        status:
          $ref: "#/components/schemas/ModelStatus"

    ModelListResponse:
      type: object
      additionalProperties: false
      required:
        - models
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/Model"

    ModelHealth:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/ModelStatus"

    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - error
        - code
      properties:
        error:
          type: string
        code:
          type: string
          example: model_not_found

    EmbedRequest:
      type: object
      additionalProperties: false
      required:
        - input
      properties:
        input:
          oneOf:
            - type: string
              minLength: 1
            - type: array
              minItems: 1
              items:
                type: string
                minLength: 1
          description: Single text or batch of texts to embed

    EmbedUsage:
      type: object
      additionalProperties: false
      required:
        - input_count
      properties:
        input_count:
          type: integer
          minimum: 1
          description: Number of input texts embedded

    EmbedResponse:
      type: object
      additionalProperties: false
      required:
        - model
        - embeddings
        - dim
        - usage
      properties:
        model:
          type: string
          example: local-embed-small
        embeddings:
          type: array
          minItems: 1
          items:
            type: array
            items:
              type: number
            description: L2-normalized embedding vector
        dim:
          type: integer
          minimum: 1
          description: Embedding dimension (matches registry embedding_dim)
        usage:
          $ref: "#/components/schemas/EmbedUsage"

    TokenUsage:
      type: object
      additionalProperties: false
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        completion_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
      description: Approximate token counts from the local/fake adapter

    GenerateRequest:
      type: object
      additionalProperties: false
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
        max_tokens:
          type: integer
          minimum: 1
          description: Max completion tokens; capped by FORGE_MODELS_GEN_MAX_TOKENS
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature; 0 is deterministic

    GenerateResponse:
      type: object
      additionalProperties: false
      required:
        - text
        - finish_reason
        - usage
      properties:
        text:
          type: string
        finish_reason:
          type: string
          enum: [stop, length]
        usage:
          $ref: "#/components/schemas/TokenUsage"

    ClassifyRequest:
      type: object
      additionalProperties: false
      required:
        - input
        - labels
      properties:
        input:
          type: string
          minLength: 1
        labels:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1

    ClassifyLabelScore:
      type: object
      additionalProperties: false
      required:
        - label
        - score
      properties:
        label:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1

    ClassifyResponse:
      type: object
      additionalProperties: false
      required:
        - labels
      properties:
        labels:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ClassifyLabelScore"
          description: Labels sorted by score descending

    SummarizeRequest:
      type: object
      additionalProperties: false
      required:
        - input
      properties:
        input:
          type: string
          minLength: 1
        max_tokens:
          type: integer
          minimum: 1
        temperature:
          type: number
          minimum: 0
          maximum: 2

    SummarizeResponse:
      type: object
      additionalProperties: false
      required:
        - summary
        - usage
      properties:
        summary:
          type: string
          minLength: 1
        usage:
          $ref: "#/components/schemas/TokenUsage"
