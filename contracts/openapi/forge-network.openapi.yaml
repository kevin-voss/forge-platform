openapi: 3.0.3
info:
  title: Forge Network API
  version: 0.1.0
  description: |
    Provider-independent cluster address plan and lease API (epic 22 / step 22.01).
    Owns cluster CIDR → per-node blocks → per-workload addresses.
servers:
  - url: http://127.0.0.1:4110
    description: Local Compose (host port 4110)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      security: []
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /health/ready:
    get:
      operationId: getHealthReady
      security: []
      responses:
        "200":
          description: Ready to serve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /v1/networks:
    get:
      operationId: listNetworks
      summary: List Network resources
      responses:
        "200":
          description: Network list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Network"
    post:
      operationId: createNetwork
      summary: Create a cluster Network address plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNetworkRequest"
            example:
              name: cluster-overlay
              spec:
                clusterCidr: "10.100.0.0/16"
                nodePrefixLength: 24
                ipv6Cidr: null
      responses:
        "201":
          description: Network created (Ready)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "409":
          description: CIDR collision or name conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                CidrCollision:
                  value:
                    error:
                      code: CidrCollision
                      message: "cluster CIDR 10.100.0.0/16 overlaps 172.17.0.0/16"
                      requestId: req_example

  /v1/networks/{name}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    get:
      operationId: getNetwork
      summary: Get a Network by name
      responses:
        "200":
          description: Network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/networks/{name}/node-leases:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    post:
      operationId: allocateNodeLease
      summary: Allocate a node address block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocateNodeLeaseRequest"
            example:
              node_id: node-a
      responses:
        "200":
          description: Node lease (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeLease"
              example:
                node_id: node-a
                cidr: "10.100.1.0/24"
                gateway: "10.100.1.1"
        "409":
          description: No address space or network not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                NoAddressSpaceAvailable:
                  value:
                    error:
                      code: NoAddressSpaceAvailable
                      message: cluster CIDR has no free node blocks
                      requestId: req_example

  /v1/networks/{name}/node-leases/{id}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: node_id
    delete:
      operationId: releaseNodeLease
      summary: Release a node address block
      responses:
        "204":
          description: Released
        "404":
          description: Not found

  /v1/networks/{name}/workload-leases:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    get:
      operationId: listWorkloadLeases
      summary: List active workload overlay address leases
      responses:
        "200":
          description: Active leases
          content:
            application/json:
              schema:
                type: object
                properties:
                  leases:
                    type: array
                    items:
                      type: object
                      properties:
                        workload_id:
                          type: string
                        node_id:
                          type: string
                        address:
                          type: string
              example:
                leases:
                  - workload_id: wl_123
                    node_id: node-a
                    address: "10.100.1.5"
        "404":
          description: Network not found
    post:
      operationId: allocateWorkloadLease
      summary: Allocate a workload address inside a node block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocateWorkloadLeaseRequest"
            example:
              node_id: node-a
              workload_id: wl_123
      responses:
        "200":
          description: Workload lease (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadLease"
              example:
                workload_id: wl_123
                address: "10.100.1.5"
        "409":
          description: Node block exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                NodeBlockExhausted:
                  value:
                    error:
                      code: NodeBlockExhausted
                      message: node block has no free addresses
                      requestId: req_example

  /v1/networks/{name}/route-drift:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    post:
      operationId: reportRouteDrift
      summary: Report Discovery/Network/route drift observations (22.06)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [drift_count]
              properties:
                drift_count:
                  type: integer
                  format: int64
            example:
              drift_count: 1
      responses:
        "202":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  drift_count:
                    type: integer
                    format: int64

  /v1/networks/{name}/workload-leases/{id}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: workload_id
    delete:
      operationId: releaseWorkloadLease
      summary: Release a workload address
      responses:
        "204":
          description: Released
        "404":
          description: Not found

  /v1/networks/{name}/nodes/{node_id}/wireguard:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    put:
      operationId: registerWireGuardPeer
      summary: Register or update a node's WireGuard public key and endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWireGuardPeerRequest"
            example:
              public_key: "b64:9fQ3z..."
              endpoint: "203.0.113.5:51820"
      responses:
        "200":
          description: Peer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireGuardPeerRegistration"
        "404":
          description: Network or node lease not found

  /v1/networks/{name}/nodes/{node_id}/peers:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    get:
      operationId: getNodePeers
      summary: Fetch the WireGuard peer set for a node
      responses:
        "200":
          description: Peer set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerSetResponse"
              example:
                node_id: node-a
                peer_version: 4
                peers:
                  - node_id: node-b
                    public_key: "b64:..."
                    endpoint: "203.0.113.5:51820"
                    allowed_ips: ["10.100.2.0/24"]
                    persistent_keepalive: 25
                  - node_id: node-c
                    public_key: "b64:..."
                    endpoint: "198.51.100.9:51820"
                    allowed_ips: ["10.100.3.0/24"]
                    persistent_keepalive: 25
        "404":
          description: Network or peer not found

  /v1/networks/{name}/nodes/{node_id}/rotate-key:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: rotateNodeKey
      summary: Start dual-key WireGuard key rotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateKeyRequest"
            example:
              new_public_key: "b64:rotated..."
      responses:
        "200":
          description: Rotation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateKeyResponse"
              example:
                status: rotating
                retire_old_after: "2026-07-23T10:30:00Z"
        "404":
          description: Peer not found

  /v1/networks/{name}/nodes/{node_id}/retire-key:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: retireNodeKey
      summary: Retire the old key after rotation window
      responses:
        "200":
          description: Old key retired
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: active

  /v1/networks/{name}/nodes/{node_id}/applied-version:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: reportAppliedPeerVersion
      summary: Runtime reports the peer_version it has applied
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppliedVersionRequest"
            example:
              applied_peer_version: 4
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_id:
                    type: string
                  applied_peer_version:
                    type: integer
                    format: int64
                  network_drift_total:
                    type: integer
                    format: int64

  /v1/nodes/{id}/network-membership:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: node-a
    get:
      operationId: getNodeNetworkMembership
      summary: Get a node's network membership and docker colocation flag
      responses:
        "200":
          description: Membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkMembership"
    patch:
      operationId: patchNodeNetworkMembership
      summary: Set a node's provider network membership and/or docker colocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkMembershipPatch"
            example:
              membership: hetzner-private-fsn1
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkMembership"
              example:
                node_id: node-a
                membership: hetzner-private-fsn1
                docker_colocated: false

  /v1/networks/{name}/transport:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - name: from
        in: query
        required: true
        schema:
          type: string
        example: node-a
      - name: to
        in: query
        required: true
        schema:
          type: string
        example: node-b
    get:
      operationId: getNetworkTransport
      summary: Resolve the per-pair transport mode for observability/debugging
      responses:
        "200":
          description: Transport for the directed pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransportPair"
              example:
                from: node-a
                to: node-b
                transport: provider-private
        "400":
          description: Missing or invalid from/to
        "404":
          description: Network not found

  /v1/projects/{project}/environments/{environment}/network-policies:
    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: string
        example: invoice-platform
      - name: environment
        in: path
        required: true
        schema:
          type: string
        example: production
    get:
      operationId: listNetworkPolicies
      summary: List NetworkPolicy resources in an environment
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NetworkPolicy"
    post:
      operationId: createNetworkPolicy
      summary: Create a NetworkPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNetworkPolicyRequest"
            example:
              name: invoice-api-policy
              organization: forge-labs
              spec:
                target:
                  application: invoice-api
                ingress:
                  - from:
                      service: invoice-frontend
                    ports:
                      - port: 8080
                        protocol: tcp
                egress:
                  - to:
                      database: invoice-db
                    ports:
                      - port: 5432
                        protocol: tcp
                  - to:
                      queue: invoice-jobs
                    ports:
                      - port: 4222
                        protocol: tcp
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPolicy"
              example:
                apiVersion: forge.dev/v1
                kind: NetworkPolicy
                metadata:
                  name: invoice-api-policy
                  organization: forge-labs
                  project: invoice-platform
                  environment: production
                  generation: 1
                  resourceVersion: "1"
                spec:
                  target:
                    application: invoice-api
                  ingress:
                    - from:
                        service: invoice-frontend
                      ports:
                        - port: 8080
                          protocol: tcp
                  egress:
                    - to:
                        database: invoice-db
                      ports:
                        - port: 5432
                          protocol: tcp
                    - to:
                        queue: invoice-jobs
                      ports:
                        - port: 4222
                          protocol: tcp
                status:
                  phase: Ready
                  observedGeneration: 1
                  conditions:
                    - type: Enforced
                      status: "True"
                      reason: AppliedToAllNodes
                      message: "3/3 nodes running invoice-api have current rules"

  /v1/projects/{project}/environments/{environment}/network-policies/{name}:
    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: string
      - name: environment
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getNetworkPolicy
      summary: Get a NetworkPolicy by name
      responses:
        "200":
          description: NetworkPolicy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPolicy"
        "404":
          description: Not found
    put:
      operationId: replaceNetworkPolicy
      summary: Replace a NetworkPolicy spec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec:
                  $ref: "#/components/schemas/NetworkPolicySpec"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPolicy"
    patch:
      operationId: patchNetworkPolicy
      summary: Patch a NetworkPolicy spec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spec]
              properties:
                spec:
                  $ref: "#/components/schemas/NetworkPolicySpec"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPolicy"
    delete:
      operationId: deleteNetworkPolicy
      summary: Delete a NetworkPolicy
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /v1/projects/{project}/environments/{environment}/network-defaults:
    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: string
      - name: environment
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getNetworkDefaults
      summary: Get the environment network default policy
      responses:
        "200":
          description: Defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentNetworkDefaults"
    patch:
      operationId: patchNetworkDefaults
      summary: Set the environment network default policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkDefaultsPatch"
            example:
              defaultPolicy: deny-all
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentNetworkDefaults"

  /v1/nodes/{node_id}/network-policy-rules:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    get:
      operationId: getNetworkPolicyRules
      summary: Fetch the compiled NetworkPolicy rule set for a node
      responses:
        "200":
          description: Per-node rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkPolicyRules"
              example:
                node_id: node-a
                generation: 7
                rules:
                  - workload_id: wl_1
                    direction: ingress
                    from_cidr: "10.100.2.5/32"
                    port: 8080
                    protocol: tcp
                    action: allow
                  - workload_id: wl_1
                    direction: egress
                    to_cidr: "0.0.0.0/0"
                    action: deny
                    reason: default-deny-environment

  /v1/nodes/{node_id}/network-policy-denied:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: reportNetworkPolicyDenied
      summary: Report a denied connection from Runtime enforcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_workload, to_workload, port]
              properties:
                from_workload:
                  type: string
                to_workload:
                  type: string
                port:
                  type: integer
                protocol:
                  type: string
                reason:
                  type: string
      responses:
        "202":
          description: Recorded (metric + network.policy.denied event)

  /v1/workload-placements/{workload_id}:
    parameters:
      - name: workload_id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: upsertWorkloadPlacement
      summary: Upsert a scheduler placement mirror used by PolicyCompiler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkloadPlacement"
      responses:
        "200":
          description: Upserted

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus text metrics (policy denies + rule generation)
      security: []
      responses:
        "200":
          description: Prometheus exposition
          content:
            text/plain:
              schema:
                type: string
              example: |
                forge_network_policy_denied_total 0
                forge_network_policy_rules_generation 7

components:
  parameters:
    NetworkName:
      name: name
      in: path
      required: true
      schema:
        type: string
      example: cluster-overlay
    NodeId:
      name: node_id
      in: path
      required: true
      schema:
        type: string
      example: node-a

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, not_ready]

    CreateNetworkRequest:
      type: object
      required: [name, spec]
      properties:
        name:
          type: string
          example: cluster-overlay
        spec:
          $ref: "#/components/schemas/NetworkSpec"

    NetworkSpec:
      type: object
      required: [clusterCidr]
      properties:
        clusterCidr:
          type: string
          example: "10.100.0.0/16"
        nodePrefixLength:
          type: integer
          default: 24
          example: 24
        ipv6Cidr:
          type: string
          nullable: true
          description: Reserved for a later epic; unused in 22.x

    Network:
      type: object
      required: [apiVersion, kind, metadata, spec, status]
      properties:
        apiVersion:
          type: string
          example: network.forge.local/v1
        kind:
          type: string
          example: Network
        metadata:
          type: object
          properties:
            id:
              type: string
              example: net_01HZKexample
            name:
              type: string
            generation:
              type: integer
            resourceVersion:
              type: string
        spec:
          $ref: "#/components/schemas/NetworkSpec"
        status:
          type: object
          properties:
            phase:
              type: string
              enum: [Ready, Failed]
            observedGeneration:
              type: integer
            conditions:
              type: array
              items:
                type: object

    AllocateNodeLeaseRequest:
      type: object
      required: [node_id]
      properties:
        node_id:
          type: string
          example: node-a

    NodeLease:
      type: object
      required: [node_id, cidr, gateway]
      properties:
        node_id:
          type: string
        cidr:
          type: string
          example: "10.100.1.0/24"
        gateway:
          type: string
          example: "10.100.1.1"

    AllocateWorkloadLeaseRequest:
      type: object
      required: [node_id, workload_id]
      properties:
        node_id:
          type: string
        workload_id:
          type: string
          example: wl_123

    WorkloadLease:
      type: object
      required: [workload_id, address]
      properties:
        workload_id:
          type: string
        address:
          type: string
          example: "10.100.1.5"

    RegisterWireGuardPeerRequest:
      type: object
      required: [public_key]
      properties:
        public_key:
          type: string
          example: "b64:9fQ3z..."
        endpoint:
          type: string
          description: host:port; omit when inbound-only via NAT
          example: "203.0.113.5:51820"

    WireGuardPeerRegistration:
      type: object
      required: [node_id, public_key, status, online]
      properties:
        node_id:
          type: string
        public_key:
          type: string
        endpoint:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, rotating, retiring]
        online:
          type: boolean

    PeerSetResponse:
      type: object
      required: [node_id, peer_version, peers]
      properties:
        node_id:
          type: string
        peer_version:
          type: integer
          format: int64
        mtu:
          type: integer
          example: 1420
        peers:
          type: array
          items:
            $ref: "#/components/schemas/PeerEntry"

    PeerEntry:
      type: object
      required: [node_id, public_key, allowed_ips, persistent_keepalive]
      properties:
        node_id:
          type: string
        public_key:
          type: string
        endpoint:
          type: string
          nullable: true
        allowed_ips:
          type: array
          items:
            type: string
          example: ["10.100.2.0/24"]
        persistent_keepalive:
          type: integer
          example: 25

    RotateKeyRequest:
      type: object
      required: [new_public_key]
      properties:
        new_public_key:
          type: string
          example: "b64:rotated..."

    RotateKeyResponse:
      type: object
      required: [status, retire_old_after]
      properties:
        status:
          type: string
          example: rotating
        retire_old_after:
          type: string
          format: date-time

    AppliedVersionRequest:
      type: object
      required: [applied_peer_version]
      properties:
        applied_peer_version:
          type: integer
          format: int64
          example: 4

    NetworkMembershipPatch:
      type: object
      properties:
        membership:
          type: string
          nullable: true
          description: Provider private-network tag; empty/null clears membership
          example: hetzner-private-fsn1
        docker_colocated:
          type: boolean
          description: True when the node shares a Docker daemon with other colocated nodes

    NetworkMembership:
      type: object
      required: [node_id, docker_colocated]
      properties:
        node_id:
          type: string
          example: node-a
        membership:
          type: string
          nullable: true
          example: hetzner-private-fsn1
        docker_colocated:
          type: boolean
          example: false
        updated_at:
          type: string
          format: date-time

    TransportPair:
      type: object
      required: [from, to, transport]
      properties:
        from:
          type: string
          example: node-a
        to:
          type: string
          example: node-b
        transport:
          type: string
          enum: [docker, provider-private, wireguard]
          example: provider-private

    CreateNetworkPolicyRequest:
      type: object
      required: [name, spec]
      properties:
        name:
          type: string
          example: invoice-api-policy
        organization:
          type: string
          example: forge-labs
        spec:
          $ref: "#/components/schemas/NetworkPolicySpec"

    NetworkPolicySpec:
      type: object
      required: [target]
      properties:
        target:
          type: object
          required: [application]
          properties:
            application:
              type: string
              example: invoice-api
        ingress:
          type: array
          items:
            type: object
            required: [from]
            properties:
              from:
                type: object
                properties:
                  service:
                    type: string
                    example: invoice-frontend
              ports:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkPolicyPort"
        egress:
          type: array
          items:
            type: object
            required: [to]
            properties:
              to:
                type: object
                properties:
                  database:
                    type: string
                    example: invoice-db
                  queue:
                    type: string
                    example: invoice-jobs
              ports:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkPolicyPort"

    NetworkPolicyPort:
      type: object
      required: [port, protocol]
      properties:
        port:
          type: integer
          example: 8080
        protocol:
          type: string
          enum: [tcp, udp]
          example: tcp

    NetworkPolicy:
      type: object
      required: [apiVersion, kind, metadata, spec, status]
      properties:
        apiVersion:
          type: string
          example: forge.dev/v1
        kind:
          type: string
          example: NetworkPolicy
        metadata:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            organization:
              type: string
            project:
              type: string
            environment:
              type: string
            generation:
              type: integer
            resourceVersion:
              type: string
        spec:
          $ref: "#/components/schemas/NetworkPolicySpec"
        status:
          type: object
          properties:
            phase:
              type: string
              enum: [Ready, Failed]
            observedGeneration:
              type: integer
            conditions:
              type: array
              items:
                type: object

    EnvironmentNetworkDefaults:
      type: object
      required: [organization, project, environment, defaultPolicy]
      properties:
        organization:
          type: string
        project:
          type: string
        environment:
          type: string
        defaultPolicy:
          type: string
          enum: [allow-within-environment, deny-all]
          example: allow-within-environment
        generation:
          type: integer

    NetworkDefaultsPatch:
      type: object
      required: [defaultPolicy]
      properties:
        defaultPolicy:
          type: string
          enum: [allow-within-environment, deny-all]
          example: deny-all
        organization:
          type: string

    NetworkPolicyRules:
      type: object
      required: [node_id, generation, rules]
      properties:
        node_id:
          type: string
          example: node-a
        generation:
          type: integer
          format: int64
          example: 7
        rules:
          type: array
          items:
            $ref: "#/components/schemas/NetworkPolicyRule"

    NetworkPolicyRule:
      type: object
      required: [workload_id, direction, action]
      properties:
        workload_id:
          type: string
        direction:
          type: string
          enum: [ingress, egress]
        from_cidr:
          type: string
        to_cidr:
          type: string
        port:
          type: integer
        protocol:
          type: string
        action:
          type: string
          enum: [allow, deny]
        reason:
          type: string
          example: default-deny-environment

    WorkloadPlacement:
      type: object
      required: [organization, project, environment, node_id]
      properties:
        workload_id:
          type: string
        organization:
          type: string
        project:
          type: string
        environment:
          type: string
        node_id:
          type: string
        application:
          type: string
        service:
          type: string
        database:
          type: string
        queue:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - CidrCollision
                - NoAddressSpaceAvailable
                - NodeBlockExhausted
                - NetworkNotReady
                - not_found
                - invalid_request
                - already_exists
                - internal_error
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties:
                type: string
