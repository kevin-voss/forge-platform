openapi: 3.0.3
info:
  title: Forge Network API
  version: 0.1.0
  description: |
    Provider-independent cluster address plan and lease API (epic 22 / step 22.01).
    Owns cluster CIDR → per-node blocks → per-workload addresses.
servers:
  - url: http://127.0.0.1:4110
    description: Local Compose (host port 4110)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      security: []
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /health/ready:
    get:
      operationId: getHealthReady
      security: []
      responses:
        "200":
          description: Ready to serve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /v1/networks:
    get:
      operationId: listNetworks
      summary: List Network resources
      responses:
        "200":
          description: Network list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Network"
    post:
      operationId: createNetwork
      summary: Create a cluster Network address plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNetworkRequest"
            example:
              name: cluster-overlay
              spec:
                clusterCidr: "10.100.0.0/16"
                nodePrefixLength: 24
                ipv6Cidr: null
      responses:
        "201":
          description: Network created (Ready)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "409":
          description: CIDR collision or name conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                CidrCollision:
                  value:
                    error:
                      code: CidrCollision
                      message: "cluster CIDR 10.100.0.0/16 overlaps 172.17.0.0/16"
                      requestId: req_example

  /v1/networks/{name}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    get:
      operationId: getNetwork
      summary: Get a Network by name
      responses:
        "200":
          description: Network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/networks/{name}/node-leases:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    post:
      operationId: allocateNodeLease
      summary: Allocate a node address block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocateNodeLeaseRequest"
            example:
              node_id: node-a
      responses:
        "200":
          description: Node lease (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeLease"
              example:
                node_id: node-a
                cidr: "10.100.1.0/24"
                gateway: "10.100.1.1"
        "409":
          description: No address space or network not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                NoAddressSpaceAvailable:
                  value:
                    error:
                      code: NoAddressSpaceAvailable
                      message: cluster CIDR has no free node blocks
                      requestId: req_example

  /v1/networks/{name}/node-leases/{id}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: node_id
    delete:
      operationId: releaseNodeLease
      summary: Release a node address block
      responses:
        "204":
          description: Released
        "404":
          description: Not found

  /v1/networks/{name}/workload-leases:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
    post:
      operationId: allocateWorkloadLease
      summary: Allocate a workload address inside a node block
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocateWorkloadLeaseRequest"
            example:
              node_id: node-a
              workload_id: wl_123
      responses:
        "200":
          description: Workload lease (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadLease"
              example:
                workload_id: wl_123
                address: "10.100.1.5"
        "409":
          description: Node block exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                NodeBlockExhausted:
                  value:
                    error:
                      code: NodeBlockExhausted
                      message: node block has no free addresses
                      requestId: req_example

  /v1/networks/{name}/workload-leases/{id}:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: workload_id
    delete:
      operationId: releaseWorkloadLease
      summary: Release a workload address
      responses:
        "204":
          description: Released
        "404":
          description: Not found

  /v1/networks/{name}/nodes/{node_id}/wireguard:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    put:
      operationId: registerWireGuardPeer
      summary: Register or update a node's WireGuard public key and endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWireGuardPeerRequest"
            example:
              public_key: "b64:9fQ3z..."
              endpoint: "203.0.113.5:51820"
      responses:
        "200":
          description: Peer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WireGuardPeerRegistration"
        "404":
          description: Network or node lease not found

  /v1/networks/{name}/nodes/{node_id}/peers:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    get:
      operationId: getNodePeers
      summary: Fetch the WireGuard peer set for a node
      responses:
        "200":
          description: Peer set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerSetResponse"
              example:
                node_id: node-a
                peer_version: 4
                peers:
                  - node_id: node-b
                    public_key: "b64:..."
                    endpoint: "203.0.113.5:51820"
                    allowed_ips: ["10.100.2.0/24"]
                    persistent_keepalive: 25
                  - node_id: node-c
                    public_key: "b64:..."
                    endpoint: "198.51.100.9:51820"
                    allowed_ips: ["10.100.3.0/24"]
                    persistent_keepalive: 25
        "404":
          description: Network or peer not found

  /v1/networks/{name}/nodes/{node_id}/rotate-key:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: rotateNodeKey
      summary: Start dual-key WireGuard key rotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateKeyRequest"
            example:
              new_public_key: "b64:rotated..."
      responses:
        "200":
          description: Rotation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateKeyResponse"
              example:
                status: rotating
                retire_old_after: "2026-07-23T10:30:00Z"
        "404":
          description: Peer not found

  /v1/networks/{name}/nodes/{node_id}/retire-key:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: retireNodeKey
      summary: Retire the old key after rotation window
      responses:
        "200":
          description: Old key retired
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: active

  /v1/networks/{name}/nodes/{node_id}/applied-version:
    parameters:
      - $ref: "#/components/parameters/NetworkName"
      - $ref: "#/components/parameters/NodeId"
    post:
      operationId: reportAppliedPeerVersion
      summary: Runtime reports the peer_version it has applied
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppliedVersionRequest"
            example:
              applied_peer_version: 4
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  node_id:
                    type: string
                  applied_peer_version:
                    type: integer
                    format: int64
                  network_drift_total:
                    type: integer
                    format: int64

components:
  parameters:
    NetworkName:
      name: name
      in: path
      required: true
      schema:
        type: string
      example: cluster-overlay
    NodeId:
      name: node_id
      in: path
      required: true
      schema:
        type: string
      example: node-a

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, not_ready]

    CreateNetworkRequest:
      type: object
      required: [name, spec]
      properties:
        name:
          type: string
          example: cluster-overlay
        spec:
          $ref: "#/components/schemas/NetworkSpec"

    NetworkSpec:
      type: object
      required: [clusterCidr]
      properties:
        clusterCidr:
          type: string
          example: "10.100.0.0/16"
        nodePrefixLength:
          type: integer
          default: 24
          example: 24
        ipv6Cidr:
          type: string
          nullable: true
          description: Reserved for a later epic; unused in 22.x

    Network:
      type: object
      required: [apiVersion, kind, metadata, spec, status]
      properties:
        apiVersion:
          type: string
          example: network.forge.local/v1
        kind:
          type: string
          example: Network
        metadata:
          type: object
          properties:
            id:
              type: string
              example: net_01HZKexample
            name:
              type: string
            generation:
              type: integer
            resourceVersion:
              type: string
        spec:
          $ref: "#/components/schemas/NetworkSpec"
        status:
          type: object
          properties:
            phase:
              type: string
              enum: [Ready, Failed]
            observedGeneration:
              type: integer
            conditions:
              type: array
              items:
                type: object

    AllocateNodeLeaseRequest:
      type: object
      required: [node_id]
      properties:
        node_id:
          type: string
          example: node-a

    NodeLease:
      type: object
      required: [node_id, cidr, gateway]
      properties:
        node_id:
          type: string
        cidr:
          type: string
          example: "10.100.1.0/24"
        gateway:
          type: string
          example: "10.100.1.1"

    AllocateWorkloadLeaseRequest:
      type: object
      required: [node_id, workload_id]
      properties:
        node_id:
          type: string
        workload_id:
          type: string
          example: wl_123

    WorkloadLease:
      type: object
      required: [workload_id, address]
      properties:
        workload_id:
          type: string
        address:
          type: string
          example: "10.100.1.5"

    RegisterWireGuardPeerRequest:
      type: object
      required: [public_key]
      properties:
        public_key:
          type: string
          example: "b64:9fQ3z..."
        endpoint:
          type: string
          description: host:port; omit when inbound-only via NAT
          example: "203.0.113.5:51820"

    WireGuardPeerRegistration:
      type: object
      required: [node_id, public_key, status, online]
      properties:
        node_id:
          type: string
        public_key:
          type: string
        endpoint:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, rotating, retiring]
        online:
          type: boolean

    PeerSetResponse:
      type: object
      required: [node_id, peer_version, peers]
      properties:
        node_id:
          type: string
        peer_version:
          type: integer
          format: int64
        mtu:
          type: integer
          example: 1420
        peers:
          type: array
          items:
            $ref: "#/components/schemas/PeerEntry"

    PeerEntry:
      type: object
      required: [node_id, public_key, allowed_ips, persistent_keepalive]
      properties:
        node_id:
          type: string
        public_key:
          type: string
        endpoint:
          type: string
          nullable: true
        allowed_ips:
          type: array
          items:
            type: string
          example: ["10.100.2.0/24"]
        persistent_keepalive:
          type: integer
          example: 25

    RotateKeyRequest:
      type: object
      required: [new_public_key]
      properties:
        new_public_key:
          type: string
          example: "b64:rotated..."

    RotateKeyResponse:
      type: object
      required: [status, retire_old_after]
      properties:
        status:
          type: string
          example: rotating
        retire_old_after:
          type: string
          format: date-time

    AppliedVersionRequest:
      type: object
      required: [applied_peer_version]
      properties:
        applied_peer_version:
          type: integer
          format: int64
          example: 4

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - CidrCollision
                - NoAddressSpaceAvailable
                - NodeBlockExhausted
                - NetworkNotReady
                - not_found
                - invalid_request
                - already_exists
                - internal_error
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties:
                type: string
