openapi: 3.0.3
info:
  title: Forge Workflows API
  version: 0.4.0
  description: |
    Durable workflow orchestration service (epic 16). Definitions load from YAML;
    runs and step state persist in Postgres and resume across restarts without
    re-executing completed steps (idempotency key: run_id + step_id).
    Step primitives: retry (persisted attempts + backoff), durable delay timers,
    step/run timeouts, parallel fan-out/fan-in, and safe conditional branching.
    Event triggers (durable Events consumer + event_id dedupe) start mapped
    workflows; `agent` steps invoke Forge Agents runs and capture results.
    Runs are project-scoped via `X-Forge-Project`.
servers:
  - url: http://127.0.0.1:4302
    description: Local Compose (host port 4302)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when the OTP supervision tree is up and the durable Postgres
        store is reachable.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-workflows
                language: elixir
                status: running
                version: 0.1.0
                uptime_seconds: 12

  /v1/workflows:
    get:
      operationId: listWorkflows
      summary: List workflow definitions
      description: Returns loaded YAML workflow definitions (name + ordered steps).
      responses:
        "200":
          description: Definition list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"

  /v1/workflows/{name}/runs:
    post:
      operationId: startWorkflowRun
      summary: Start a workflow run
      description: |
        Creates a durable run in `queued`/`running` state and returns 202.
        Requires `X-Forge-Project`.
      parameters:
        - $ref: "#/components/parameters/WorkflowName"
        - $ref: "#/components/parameters/ForgeProject"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
            example:
              input: {}
      responses:
        "202":
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRunResponse"
              example:
                run_id: 0193f0c2-6c5a-7b8e-9f01-23456789abcd
                status: running
        "400":
          description: Missing project header or invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Workflow definition not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs:
    get:
      operationId: listRuns
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ForgeProject"
      responses:
        "200":
          description: Project-scoped runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "400":
          description: Missing project header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/runs/{id}:
    get:
      operationId: getRun
      summary: Get a run by id
      description: |
        Returns run status and durable step history. Cross-project reads return 404.
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/ForgeProject"
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
        "400":
          description: Missing project header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Run not found in project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/triggers/test:
    post:
      operationId: testTrigger
      summary: Inject a synthetic event for trigger testing
      description: |
        Starts workflows mapped to the event type exactly once per
        `(event_id, workflow)` via the durable event_dedup table. Useful when
        the Events consumer is disabled or for deterministic CI.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectOptional"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerTestRequest"
            example:
              event: deployment.failed
              event_id: evt-test-1
              data:
                deployment_id: dep-123
                service_id: svc-1
                reason: health_check_failed
                failed_at: "2026-07-23T09:00:00Z"
      responses:
        "202":
          description: Trigger accepted (started, duplicate, or unmatched)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerTestResponse"
        "400":
          description: Invalid body or missing project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    ForgeProject:
      name: X-Forge-Project
      in: header
      required: true
      schema:
        type: string
      description: Project scope for run isolation
    ForgeProjectOptional:
      name: X-Forge-Project
      in: header
      required: false
      schema:
        type: string
      description: |
        Project scope for trigger test. Falls back to
        `FORGE_WORKFLOWS_DEFAULT_PROJECT` when omitted.
    WorkflowName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Workflow definition name
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required:
        - status
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-workflows
        language:
          type: string
          example: elixir
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          example: 12

    StartRunRequest:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
          description: Opaque workflow input map

    StartRunResponse:
      type: object
      required:
        - run_id
        - status
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
          example: running

    RetryPolicy:
      type: object
      required:
        - max_attempts
        - backoff
        - base_ms
      properties:
        max_attempts:
          type: integer
          minimum: 1
        backoff:
          type: string
          enum: [fixed, exponential]
        base_ms:
          type: integer
          minimum: 0

    TriggerConfig:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          description: Platform event type / subject (e.g. deployment.failed)
          example: deployment.failed

    WorkflowStepDef:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
        type:
          type: string
          enum: [log, noop, task, delay, timeout, parallel, conditional, retry, agent]
        message:
          type: string
        delay_ms:
          type: integer
          minimum: 0
          description: For type=delay, durable wake_at timer; for log/noop short in-process sleep
        action:
          type: string
          description: Task action (noop|fail|fail_until|sleep)
        timeout_ms:
          type: integer
          minimum: 1
        retry:
          $ref: "#/components/schemas/RetryPolicy"
        when:
          type: string
          description: Safe conditional expression over context (e.g. context.severity == 'high')
        then:
          type: string
        else:
          type: string
        agent:
          type: string
          description: Forge Agents agent name (required for type=agent)
          example: deployment-investigator
        input:
          type: object
          additionalProperties: true
          description: |
            Agent input map. String values may use `${event.field}` templates
            resolved from the workflow run input.
        branches:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStepDef"
          description: Parallel fan-out branch step definitions (or string id refs)

    WorkflowDefinition:
      type: object
      required:
        - name
        - steps
      properties:
        name:
          type: string
        timeout_ms:
          type: integer
          minimum: 1
          description: Optional run-level deadline from run start
        trigger:
          $ref: "#/components/schemas/TriggerConfig"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStepDef"

    TriggerTestRequest:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          description: Event type / subject to match against definition triggers
          example: deployment.failed
        event_id:
          type: string
          description: Optional stable event id for dedupe (generated when omitted)
        data:
          type: object
          additionalProperties: true
          description: Event payload (becomes run input under `event`)

    TriggerTestResponse:
      type: object
      required:
        - status
        - event
        - event_id
        - runs
      properties:
        status:
          type: string
          enum: [started, duplicate, unmatched]
        event:
          type: string
        event_id:
          type: string
        runs:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              run_id:
                type: string
                format: uuid
              workflow:
                type: string
              event_id:
                type: string
              status:
                type: string


    WorkflowList:
      type: object
      required:
        - workflows
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDefinition"

    WorkflowStep:
      type: object
      required:
        - id
        - type
        - status
      properties:
        id:
          type: string
          description: Step id from the definition (idempotency key with run_id)
        type:
          type: string
        status:
          type: string
          enum: [pending, running, waiting, completed, failed, skipped]
        attempt:
          type: integer
          minimum: 0
          description: Persisted attempt count (retry policy)
        wake_at:
          type: string
          format: date-time
          nullable: true
          description: Durable timer deadline for delay/retry backoff
        parent_step_id:
          type: string
          nullable: true
          description: Parent step id for parallel child rows
        output:
          type: object
          additionalProperties: true
        error:
          type: string

    WorkflowRun:
      type: object
      required:
        - run_id
        - workflow
        - project_id
        - status
        - steps
      properties:
        run_id:
          type: string
          format: uuid
        workflow:
          type: string
        project_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        input:
          type: object
          additionalProperties: true
        current_step:
          type: string
          nullable: true
        result:
          type: object
          additionalProperties: true
        error:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStep"

    RunList:
      type: object
      required:
        - runs
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRun"

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type: string
