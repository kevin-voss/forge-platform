openapi: 3.0.3
info:
  title: Forge Observe API
  version: 0.3.0
  description: |
    Platform observability service (epic 12). Correlation contract, backend
    health, correlated log query (`GET /v1/logs`, step 12.04), and live log
    stream (`GET /v1/logs/stream`, step 12.05).
servers:
  - url: http://127.0.0.1:4106
    description: Local Compose (host port 4106)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when every backend listed in
        `FORGE_OBSERVE_READY_REQUIRE_BACKENDS` (default loki,tempo,prometheus)
        is reachable; non-200 otherwise. Liveness stays 200 while backends are
        down so orchestrators can distinguish process death from degraded
        telemetry.
      security: []
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Not ready (required backend unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      security: []
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-observe
                language: go
                status: running
                version: 0.1.0

  /v1/health/backends:
    get:
      operationId: getBackendHealth
      summary: Telemetry backend reachability
      description: |
        Reports read-only health of Loki, Tempo, and Prometheus. Values are
        `ok` or `down`. This endpoint remains 200 even when backends are down
        so operators can inspect which dependency failed; readiness reflects
        the required-backend gate separately.
      security: []
      responses:
        "200":
          description: Per-backend status map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendHealth"
              example:
                loki: ok
                tempo: ok
                prometheus: ok

  /v1/logs:
    get:
      operationId: queryLogs
      summary: Correlated log query
      description: |
        Query Loki for structured logs filtered by Forge correlation fields.
        At least one scoping filter is required: `project`, `deployment`,
        `service`, `request_id`, or `trace_id`. Limit and time range are clamped
        to `FORGE_LOG_QUERY_MAX_LIMIT` / `FORGE_LOG_QUERY_MAX_RANGE_H`.
        When `FORGE_AUTH_MODE=enforce`, callers may only query projects they
        can `project.read`.
      parameters:
        - name: project
          in: query
          schema:
            type: string
          description: Filter by forge.project / forge_project
        - name: deployment
          in: query
          schema:
            type: string
          description: Filter by forge.deployment / forge_deployment
        - name: service
          in: query
          schema:
            type: string
          description: Filter by forge.service / forge_service
        - name: request_id
          in: query
          schema:
            type: string
          description: Filter by request_id
        - name: trace_id
          in: query
          schema:
            type: string
          description: Filter by trace_id (returns all services in the trace)
        - name: since
          in: query
          schema:
            type: string
          description: Start of range (RFC3339 or unix); default until−1h
        - name: until
          in: query
          schema:
            type: string
          description: End of range (RFC3339 or unix); default now
        - name: q
          in: query
          schema:
            type: string
          description: Free-text substring (escaped; injection-safe)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 100
          description: Max entries (clamped to FORGE_LOG_QUERY_MAX_LIMIT)
        - name: direction
          in: query
          schema:
            type: string
            enum: [forward, backward]
            default: backward
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque pagination cursor from a prior next_cursor
      responses:
        "200":
          description: Matching log entries (time-ordered)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogQueryResult"
              example:
                entries:
                  - time: "2026-07-23T10:00:00.000000001Z"
                    service: control
                    trace_id: "4bf92f3577b34da6a3ce929d0e0e4736"
                    request_id: "req_1"
                    level: info
                    message: "request"
                    deployment: dpl_1
                    project: prj_1
                next_cursor: ""
        "400":
          description: Missing scoping filter or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Project log access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Loki unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/logs/stream:
    get:
      operationId: streamLogs
      summary: Live correlated log tail (SSE)
      description: |
        Server-Sent Events stream of log entries matching the same correlation
        filters as `GET /v1/logs`. Each `event: log` carries a `LogEntry` JSON
        payload. When Loki is unavailable the endpoint returns `503` before the
        stream starts so clients can fall back to Runtime log streaming.
        Authz matches the query API (`project.read` in enforce mode).
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: deployment
          in: query
          schema:
            type: string
        - name: service
          in: query
          schema:
            type: string
        - name: request_id
          in: query
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
          description: Resume cursor / catch-up start (RFC3339 or unix)
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of LogEntry events (`text/event-stream`)
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: log
                data: {"time":"2026-07-23T10:00:00.000000001Z","service":"control","trace_id":"4bf92f3577b34da6a3ce929d0e0e4736","message":"request","deployment":"dpl_1","project":"prj_1"}
        "400":
          description: Missing scoping filter or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Project log access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Loki unavailable (clients may fall back to Runtime)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, not_ready]

    Identity:
      type: object
      required: [service, language, status]
      properties:
        service:
          type: string
          example: forge-observe
        language:
          type: string
          example: go
        status:
          type: string
          example: running
        version:
          type: string
        uptime_seconds:
          type: number

    BackendHealth:
      type: object
      required: [loki, tempo, prometheus]
      properties:
        loki:
          type: string
          enum: [ok, down]
        tempo:
          type: string
          enum: [ok, down]
        prometheus:
          type: string
          enum: [ok, down]

    LogEntry:
      type: object
      required: [time, service, message]
      description: Normalized correlation field set (12.01)
      properties:
        time:
          type: string
          format: date-time
        service:
          type: string
        trace_id:
          type: string
        request_id:
          type: string
        span_id:
          type: string
        level:
          type: string
        message:
          type: string
        deployment:
          type: string
        project:
          type: string
        node:
          type: string

    LogQueryResult:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        next_cursor:
          type: string
        warnings:
          type: array
          items:
            type: string
        capped:
          type: boolean

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties:
                type: string
