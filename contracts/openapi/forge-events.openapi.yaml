openapi: 3.0.3
info:
  title: Forge Events API
  version: 0.2.0
  description: |
    Platform events service (epic 11). Step 11.02 adds HTTP publish and
    pull-consume over NATS JetStream. Durable ack/retry, DLQ, schemas, and
    auth arrive in later steps. Auth is not required yet (documented for 11.06).
servers:
  - url: http://127.0.0.1:4105
    description: Local Compose (host port 4105)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when NATS JetStream is connected and platform streams exist;
        non-200 otherwise. Liveness stays 200 while reconnecting.
      security: []
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Not ready (JetStream unreachable or streams missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      security: []
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-events
                language: go
                status: running
                version: 0.1.0

  /v1/events:
    post:
      operationId: publishEvent
      summary: Publish an event
      description: |
        Validates the subject against known stream families, wraps the payload in
        a standard envelope, and publishes to JetStream. Returns 202 with
        event_id, stream, and sequence. No auth yet (11.06).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
            example:
              subject: application.crashed
              data:
                service: demo
                reason: oom
              source: runtime
      responses:
        "202":
          description: Event accepted and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
              example:
                event_id: evt_1
                stream: application
                seq: 42
        "400":
          description: Unknown or invalid subject / request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "413":
          description: Payload exceeds FORGE_EVENT_MAX_BYTES
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: JetStream publish failed (retryable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /v1/consume:
    post:
      operationId: consumeEvents
      summary: Pull-consume events
      description: |
        Long-polls JetStream for a batch of messages matching subject. Returns an
        empty messages array when none arrive within the wait window. Messages
        include an ack_token stub; durable ack semantics arrive in 11.03.
        Auto-ack is applied on deliver in this step.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumeRequest"
            example:
              subject: application.crashed
              batch: 10
      responses:
        "200":
          description: Batch of delivered messages (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumeResponse"
        "400":
          description: Unknown or invalid subject / request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: JetStream consume failed (retryable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string
          description: Short health indicator (e.g. ok, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          description: Logical service name
          example: forge-events
        language:
          type: string
          description: Implementation language
          example: go
        status:
          type: string
          description: Process status
          example: running
        version:
          type: string
          description: Service version
        uptime_seconds:
          type: number
          description: Seconds since process start

    Envelope:
      type: object
      description: Standard event wrapper stored as the JetStream message payload
      required:
        - id
        - subject
        - time
        - data
      properties:
        id:
          type: string
          description: Unique event id (also used as NATS msg-id)
          example: evt_01hxyz
        subject:
          type: string
          example: application.crashed
        time:
          type: string
          format: date-time
        source:
          type: string
          description: Optional producer identity
          example: runtime
        data:
          description: Opaque JSON payload (schema validation in 11.05)

    PublishRequest:
      type: object
      required:
        - subject
        - data
      properties:
        subject:
          type: string
          description: Concrete subject in a known family (e.g. application.crashed)
        data:
          description: Opaque JSON event payload
        source:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string

    PublishResponse:
      type: object
      required:
        - event_id
        - stream
        - seq
      properties:
        event_id:
          type: string
        stream:
          type: string
        seq:
          type: integer
          format: int64
          minimum: 0

    ConsumeRequest:
      type: object
      required:
        - subject
      properties:
        subject:
          type: string
        batch:
          type: integer
          minimum: 1
          description: Max messages to return (capped by FORGE_CONSUME_MAX_BATCH)
        consumer:
          type: string
          description: Optional pull consumer name; default is subject-derived

    DeliveredMessage:
      type: object
      required:
        - event_id
        - subject
        - time
        - data
        - ack_token
      properties:
        event_id:
          type: string
        subject:
          type: string
        time:
          type: string
          format: date-time
        source:
          type: string
        data:
          description: Opaque JSON payload from the envelope
        ack_token:
          type: string
          description: Opaque delivery token (ack API in 11.03)

    ConsumeResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DeliveredMessage"

    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties:
                type: string
