openapi: 3.0.3
info:
  title: Forge Discovery API
  version: 0.3.0
  description: |
    Forge Discovery (epic 21). Step 21.03 adds readiness-filtered endpoint selection,
    a scoped SSE watch, and the Go `forge-discovery-client` library.

    Relationship to epic 20: Control's generic `GET /v1/watch/endpoints` (mirrored from
    Discovery writes in 21.02) remains available for uniform tooling even when Discovery's
    own watch is down. The scoped `.../endpoints/watch` path here is the low-latency,
    Discovery-native alternative that does not require Control to be up.
servers:
  - url: http://127.0.0.1:4109
    description: Local Compose (host port 4109)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when the discovery Postgres pool is reachable and Service/Endpoint
        kinds have been registered with Control at least once; otherwise 503.
      security: []
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok
        "503":
          description: Not ready (DB unreachable or kinds not registered)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /v1/projects/{project}/environments/{environment}/services/{service}/endpoints:
    parameters:
      - $ref: "#/components/parameters/Project"
      - $ref: "#/components/parameters/Environment"
      - $ref: "#/components/parameters/Service"
    post:
      operationId: registerEndpoint
      summary: Register (or upsert) an endpoint lease
      description: Idempotent upsert keyed by replica id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterEndpointRequest"
            example:
              id: invoice-api-7f3a2b1c-0
              node: node-b
              address:
                ip: 172.20.0.14
                port: 8080
              protocol: http
              revision: v2
              leaseSeconds: 20
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterEndpointResponse"
              example:
                id: invoice-api-7f3a2b1c-0
                service: invoice-api
                phase: Pending
                expiresAt: "2026-07-22T10:00:20Z"
    get:
      operationId: listServiceEndpoints
      summary: List endpoints for a service (Ready-only by default)
      description: |
        Defaults to `phase=Ready` only. Pass `ready=false` to include all phases.
        Optional `revision` filters by the revision label. Never leaks endpoints
        outside the project/environment/service path.
      parameters:
        - name: ready
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: When false, include Unready/Pending/Terminating endpoints.
        - name: revision
          in: query
          required: false
          schema:
            type: string
          description: When set, only endpoints with this revision label.
      responses:
        "200":
          description: Endpoint list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EndpointListItem"
              example:
                - id: invoice-api-7f3a2b1c-0
                  address:
                    ip: 172.20.0.14
                    port: 8080
                  node: node-b
                  revision: v2
                  phase: Ready
                - id: invoice-api-91ffae02-1
                  address:
                    ip: 172.20.0.19
                    port: 8080
                  node: node-a
                  revision: v2
                  phase: Ready
        "503":
          description: List query unavailable; retry after Retry-After
          headers:
            Retry-After:
              schema:
                type: string

  /v1/projects/{project}/environments/{environment}/services/{service}/endpoints/watch:
    parameters:
      - $ref: "#/components/parameters/Project"
      - $ref: "#/components/parameters/Environment"
      - $ref: "#/components/parameters/Service"
      - name: since
        in: query
        required: true
        schema:
          type: integer
          minimum: 0
        description: |
          Watch cursor (broker stream resourceVersion). Events with version > since
          are replayed. When since is older than the retained buffer, the server
          performs a full Ready resync (synthetic `added` events) instead of an error.
    get:
      operationId: watchServiceEndpoints
      summary: SSE watch for one service's endpoints
      description: |
        Scoped, Discovery-native SSE stream of `added` / `updated` / `removed` events,
        consistent with epic 20's `since` cursor convention. Heartbeat comments keep
        idle connections alive.
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/EndpointWatchSSE"
              examples:
                added:
                  summary: Endpoint added
                  value: |
                    event: added
                    id: 4822
                    data: {"id":"invoice-api-a1b2c3-2","phase":"Ready","resourceVersion":"4822","address":{"ip":"172.20.0.20","port":8080},"node":"node-a"}
                updated:
                  summary: Endpoint updated
                  value: |
                    event: updated
                    id: 4823
                    data: {"id":"invoice-api-7f3a2b1c-0","phase":"Unready","resourceVersion":"4823"}
                removed:
                  summary: Endpoint removed
                  value: |
                    event: removed
                    id: 4824
                    data: {"id":"invoice-api-91ffae02-1","resourceVersion":"4824"}
        "400":
          description: Missing or invalid since
        "503":
          description: Watch connection limit reached

  /v1/projects/{project}/environments/{environment}/endpoints/{id}/renew:
    parameters:
      - $ref: "#/components/parameters/Project"
      - $ref: "#/components/parameters/Environment"
      - $ref: "#/components/parameters/EndpointId"
    post:
      operationId: renewEndpoint
      summary: Renew lease and report readiness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewEndpointRequest"
            example:
              ready: true
              leaseSeconds: 20
      responses:
        "200":
          description: Renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewEndpointResponse"
              example:
                id: invoice-api-7f3a2b1c-0
                phase: Ready
                expiresAt: "2026-07-22T10:00:40Z"
        "404":
          description: Endpoint not found

  /v1/projects/{project}/environments/{environment}/endpoints/{id}:
    parameters:
      - $ref: "#/components/parameters/Project"
      - $ref: "#/components/parameters/Environment"
      - $ref: "#/components/parameters/EndpointId"
    delete:
      operationId: deregisterEndpoint
      summary: Explicit deregister on graceful stop
      responses:
        "204":
          description: Removed
        "404":
          description: Endpoint not found

components:
  parameters:
    Project:
      name: project
      in: path
      required: true
      schema:
        type: string
    Environment:
      name: environment
      in: path
      required: true
      schema:
        type: string
    Service:
      name: service
      in: path
      required: true
      schema:
        type: string
    EndpointId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, not_ready]

    RegisterEndpointRequest:
      type: object
      required: [id, node, address]
      properties:
        id:
          type: string
        node:
          type: string
        address:
          $ref: "#/components/schemas/EndpointAddress"
        protocol:
          type: string
          default: http
        revision:
          type: string
        leaseSeconds:
          type: integer
          default: 20

    RegisterEndpointResponse:
      type: object
      required: [id, service, phase, expiresAt]
      properties:
        id:
          type: string
        service:
          type: string
        phase:
          type: string
        expiresAt:
          type: string
          format: date-time

    RenewEndpointRequest:
      type: object
      required: [ready]
      properties:
        ready:
          type: boolean
        leaseSeconds:
          type: integer
          default: 20

    RenewEndpointResponse:
      type: object
      required: [id, phase, expiresAt]
      properties:
        id:
          type: string
        phase:
          type: string
        expiresAt:
          type: string
          format: date-time

    EndpointAddress:
      type: object
      required: [ip, port]
      properties:
        ip:
          type: string
        port:
          type: integer

    EndpointListItem:
      type: object
      properties:
        id:
          type: string
        service:
          type: string
        node:
          type: string
        phase:
          type: string
        ready:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        address:
          $ref: "#/components/schemas/EndpointAddress"
        protocol:
          type: string
        revision:
          type: string
        resourceVersion:
          type: string
        unreadyReason:
          type: string

    EndpointWatchEventPayload:
      type: object
      required: [id, resourceVersion]
      properties:
        id:
          type: string
        service:
          type: string
        node:
          type: string
        phase:
          type: string
        ready:
          type: boolean
        revision:
          type: string
        protocol:
          type: string
        resourceVersion:
          type: string
          description: Broker stream cursor for this event
        unreadyReason:
          type: string
        address:
          $ref: "#/components/schemas/EndpointAddress"

    EndpointWatchSSE:
      type: string
      description: |
        Server-Sent Events. Each frame uses `event:` of `added`|`updated`|`removed`,
        optional `id:` equal to the stream resourceVersion, and `data:` as JSON
        EndpointWatchEventPayload. Comment lines (`: heartbeat`) keep the stream alive.
