openapi: 3.0.3
info:
  title: Forge Secrets API
  version: 0.1.0
  description: |
    Platform secrets service (epic 10). Skeleton health and identity surfaces from 10.01;
    encrypted secret store, config APIs, injection, and audit arrive in later steps.
servers:
  - url: http://127.0.0.1:4104
    description: Local Compose (host port 4104)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when Postgres is reachable, migrations are applied, and the
        master key self-check (load + wrap/unwrap round-trip) succeeds; non-200 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (DB unreachable, missing/invalid master key, or self-check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-secrets
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

components:
  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-secrets
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double
