openapi: 3.0.3
info:
  title: Forge Secrets API
  version: 0.3.0
  description: |
    Platform secrets service (epic 10). Encrypted secret store with versioning and
    metadata APIs (10.02), plus non-secret config APIs and Identity-backed project
    isolation (10.03). Injection and audit arrive in later steps.

    As of 10.03, all secret and config endpoints require `Authorization: Bearer`
    when `FORGE_AUTH_MODE=enforce` (default). Config values are plaintext and returned
    by list APIs; secret list/metadata never return plaintext.
servers:
  - url: http://127.0.0.1:4104
    description: Local Compose (host port 4104)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when Postgres is reachable, migrations are applied, and the
        master key self-check (load + wrap/unwrap round-trip) succeeds; non-200 otherwise.
      security: []
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (DB unreachable, missing/invalid master key, or self-check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      security: []
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-secrets
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/projects/{project_id}/envs/{environment}/secrets:
    get:
      operationId: listSecrets
      summary: List secret metadata
      description: |
        Returns names, current versions, and timestamps for secrets in a project/env.
        Never returns plaintext values or ciphertext. Requires `secret.read`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
      responses:
        "200":
          description: Metadata list (no values)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecretListItem"
              example:
                - name: DATABASE_PASSWORD
                  version: 2
                  created_at: "2026-07-23T00:00:00Z"
                  updated_at: "2026-07-23T01:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/NotReady"

  /v1/projects/{project_id}/envs/{environment}/secrets/{name}:
    put:
      operationId: setSecret
      summary: Set (create or version) a secret
      description: |
        Encrypts the value with the project data key and stores a new version
        (version = previous max + 1). Plaintext is never persisted. Requires `secret.write`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
        - $ref: "#/components/parameters/secretName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSecretRequest"
            example:
              value: s3cret
      responses:
        "201":
          description: Secret version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetSecretResponse"
              example:
                name: DATABASE_PASSWORD
                version: 1
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Value too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: value exceeds FORGE_SECRETS_MAX_VALUE_BYTES (65536)
                code: value_too_large
        "503":
          $ref: "#/components/responses/NotReady"
    get:
      operationId: getSecretMetadata
      summary: Get secret metadata and version history
      description: Returns current version and history. Never returns plaintext values. Requires `secret.read`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
        - $ref: "#/components/parameters/secretName"
      responses:
        "200":
          description: Metadata + version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretMetadata"
              example:
                name: DATABASE_PASSWORD
                current_version: 2
                versions:
                  - version: 1
                    created_at: "2026-07-23T00:00:00Z"
                  - version: 2
                    created_at: "2026-07-23T01:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/NotReady"

  /v1/projects/{project_id}/envs/{environment}/secrets/{name}:access:
    post:
      operationId: accessSecret
      summary: Authorized reveal (decrypt)
      description: |
        Decrypts and returns the secret value for the latest (or requested) version.
        This is the only path that returns plaintext. Requires `secret.read`.
        Audited (full audit in 10.06). Fail-closed with 503 if Identity is unreachable.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
        - $ref: "#/components/parameters/secretName"
        - name: version
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Optional specific version; defaults to latest
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessSecretRequest"
            example:
              version: 2
      responses:
        "200":
          description: Decrypted value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessSecretResponse"
              example:
                name: DATABASE_PASSWORD
                version: 2
                value: s3cret
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Decrypt failure (wrong/rotated key); no garbage plaintext
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: crypto error
                code: crypto_decrypt_failed
        "503":
          $ref: "#/components/responses/NotReady"

  /v1/projects/{project_id}/envs/{environment}/config:
    get:
      operationId: listConfig
      summary: List configuration values
      description: |
        Returns non-secret configuration for a project/env **including values**.
        Do not store secrets in config. Requires `config.read`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
      responses:
        "200":
          description: Config list (values included)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfigListItem"
              example:
                - name: FEATURE_X
                  value: "true"
                  updated_at: "2026-07-23T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/NotReady"

  /v1/projects/{project_id}/envs/{environment}/config/{name}:
    put:
      operationId: setConfig
      summary: Set a configuration value
      description: |
        Upserts a plaintext config value (non-secret). Requires `config.write`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
        - $ref: "#/components/parameters/configName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetConfigRequest"
            example:
              value: "true"
      responses:
        "201":
          description: Config value stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigListItem"
              example:
                name: FEATURE_X
                value: "true"
                updated_at: "2026-07-23T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Value too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: value exceeds FORGE_SECRETS_MAX_VALUE_BYTES (65536)
                code: value_too_large
        "503":
          $ref: "#/components/responses/NotReady"
    delete:
      operationId: deleteConfig
      summary: Delete a configuration value
      description: Deletes a config entry. Returns 404 if missing. Requires `config.write`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/environment"
        - $ref: "#/components/parameters/configName"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Config not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: config not found
                code: not_found
        "503":
          $ref: "#/components/responses/NotReady"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Identity session or API token (introspected via Forge Identity)

  parameters:
    projectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
      example: prj_1
    environment:
      name: environment
      in: path
      required: true
      schema:
        type: string
      example: production
    secretName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      example: DATABASE_PASSWORD
    configName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      example: FEATURE_X

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            error: secret name must be [A-Za-z_][A-Za-z0-9_]*
            code: bad_request
    Unauthorized:
      description: Missing or inactive bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            error: missing Authorization bearer token
            code: unauthenticated
    Forbidden:
      description: Authenticated but not authorized (role or project isolation)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            error: project isolation denied
            code: forbidden
    NotFound:
      description: Secret not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            error: secret not found
            code: not_found
    NotReady:
      description: Service not ready or Identity unavailable (fail-closed)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
          example:
            error: service not ready
            code: not_ready

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-secrets
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double

    SetSecretRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          description: Plaintext secret value (encrypted at rest; never logged)

    SetSecretResponse:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: integer
          minimum: 1

    SecretListItem:
      type: object
      required: [name, version, updated_at]
      additionalProperties: false
      description: Metadata only — must not include a value field
      properties:
        name:
          type: string
        version:
          type: integer
          minimum: 1
          description: Current (latest) version
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SecretVersion:
      type: object
      required: [version, created_at]
      properties:
        version:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time

    SecretMetadata:
      type: object
      required: [name, current_version, versions]
      additionalProperties: false
      description: Metadata + history — must not include a value field
      properties:
        name:
          type: string
        current_version:
          type: integer
          minimum: 1
        versions:
          type: array
          items:
            $ref: "#/components/schemas/SecretVersion"

    AccessSecretRequest:
      type: object
      properties:
        version:
          type: integer
          minimum: 1
          description: Optional specific version; omit for latest

    AccessSecretResponse:
      type: object
      required: [name, version, value]
      properties:
        name:
          type: string
        version:
          type: integer
          minimum: 1
        value:
          type: string
          description: Decrypted plaintext (authorized reveal only)

    SetConfigRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          description: Plaintext non-secret config value (stored as-is; do not put secrets here)

    ConfigListItem:
      type: object
      required: [name, value, updated_at]
      additionalProperties: false
      description: Non-secret config — values are intentionally returned
      properties:
        name:
          type: string
        value:
          type: string
        updated_at:
          type: string
          format: date-time

    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
