openapi: 3.0.3
info:
  title: Forge Memory API
  version: 0.1.0
  description: |
    Platform semantic vector-memory service (epic 17). Health/identity, durable
    persistence root, collections with fixed-dimension vectors + metadata, batch
    upsert, cosine nearest-neighbor query, and project namespaces with Identity
    ACL (17.04).
servers:
  - url: http://127.0.0.1:4303
    description: Local Compose (host port 4303)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when `FORGE_MEMORY_ROOT` exists, contains `vectors/` and
        `meta/`, is writable, is not world-writable, and the SQLite metadata
        index is attached; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (memory root missing, unwritable, or security check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-memory
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/collections:
    post:
      operationId: createCollection
      summary: Create a collection
      description: |
        Creates a project-scoped collection with a fixed vector dimension and
        cosine distance. Project context comes from Identity bearer token
        (`FORGE_AUTH_MODE=enforce`) or `X-Forge-Project` (dev).
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
            example:
              name: incidents
              dim: 384
              distance: cosine
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "400":
          description: Invalid name, dim, distance, or missing project context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but role cannot write
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Collection name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Collection store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listCollections
      summary: List collections for the caller's project
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
      responses:
        "200":
          description: Collections visible to the caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionList"
        "400":
          description: Missing project context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/collections/{name}:
    get:
      operationId: getCollection
      summary: Get a collection by name
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
      responses:
        "200":
          description: Collection found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Collection not found in the caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCollection
      summary: Delete a collection and its records
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
      responses:
        "204":
          description: Collection deleted
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/collections/{name}/upsert:
    post:
      operationId: upsertRecords
      summary: Batch upsert vectors + metadata
      description: |
        Insert or update records by id. Vectors are L2-normalized before storage.
        Batch size is capped by `FORGE_MEMORY_MAX_UPSERT_BATCH` (default 512).
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRequest"
            example:
              records:
                - id: i1
                  vector: [0.1, 0.2, 0.3]
                  metadata:
                    type: deploy
      responses:
        "200":
          description: Upsert applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertResponse"
              example:
                upserted: 1
        "400":
          description: Invalid request body or record id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Dimension mismatch or batch over cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/collections/{name}/query:
    post:
      operationId: queryCollection
      summary: Brute-force cosine nearest-neighbor query
      description: |
        L2-normalizes the query vector, scores all live (non-tombstoned) records
        with optional metadata filter (equality / `$in`), and returns top-k by
        score descending. `top_k` is capped by `FORGE_MEMORY_MAX_TOP_K` (default 100).
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
            example:
              vector: [0.1, 0.2, 0.3]
              top_k: 5
              filter:
                type: deploy
      responses:
        "200":
          description: Ranked results (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
              example:
                results:
                  - id: i1
                    score: 0.98
                    metadata:
                      type: deploy
        "400":
          description: Invalid top_k
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Dimension mismatch or top_k over cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/collections/{name}/records:
    get:
      operationId: listRecords
      summary: List records in a collection
      description: |
        Paginated list of live records (`id`, `vector`, `metadata`, optional
        `document_ref`). Tombstoned records are omitted.
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Page of records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordList"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/collections/{name}/records/{id}:
    get:
      operationId: getRecord
      summary: Get a record by id
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
        - $ref: "#/components/parameters/RecordId"
      responses:
        "200":
          description: Record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "404":
          description: Record or collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Dimension mismatch (insert/upsert paths)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteRecord
      summary: Tombstone a record
      description: |
        Marks the record deleted so it is excluded from queries. Vector slots
        are reclaimed by boot/periodic compaction (`FORGE_MEMORY_COMPACT_ON_BOOT`).
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/NamespaceQuery"
        - $ref: "#/components/parameters/CollectionName"
        - $ref: "#/components/parameters/RecordId"
      responses:
        "204":
          description: Record tombstoned
        "404":
          description: Record or collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Identity session or API token (`FORGE_AUTH_MODE=enforce`)
  parameters:
    ForgeProjectHeader:
      name: X-Forge-Project
      in: header
      required: false
      description: |
        Project id for isolation. Required in `FORGE_AUTH_MODE=dev`. In enforce
        mode, optional when the bearer token already carries `project_id`; else
        must name a project the principal may access.
      schema:
        type: string
        example: proj-a
    NamespaceQuery:
      name: namespace
      in: query
      required: false
      description: |
        Optional sub-namespace within the project (e.g. `agent-memory`, `docs`).
        Empty/omitted uses the project default namespace. Unknown namespaces are
        treated as empty (no existence leak beyond `404` on missing collections).
      schema:
        type: string
        example: agent-memory
    CollectionName:
      name: name
      in: path
      required: true
      description: Collection name (`a-z0-9_-`, 1–128 characters)
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[a-z0-9][a-z0-9_-]{0,126}[a-z0-9]$|^[a-z0-9]$'
        example: incidents
    RecordId:
      name: id
      in: path
      required: true
      description: Record id (1–256 characters; no path separators)
      schema:
        type: string
        minLength: 1
        maxLength: 256
        example: rec-1

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: live

    Identity:
      type: object
      required: [service, language, status, version]
      properties:
        service:
          type: string
          example: forge-memory
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double
          example: 12.5

    CreateCollectionRequest:
      type: object
      required: [name, dim]
      properties:
        name:
          type: string
          example: incidents
        dim:
          type: integer
          minimum: 1
          maximum: 4096
          example: 384
        distance:
          type: string
          enum: [cosine]
          default: cosine
        namespace:
          type: string
          description: Optional; overrides `?namespace=` when set
          example: docs

    Collection:
      type: object
      required: [name, project_id, namespace, dim, distance, count, created_at]
      properties:
        name:
          type: string
        project_id:
          type: string
        namespace:
          type: string
          description: Sub-namespace within the project (empty string = default)
          example: agent-memory
        dim:
          type: integer
        distance:
          type: string
          enum: [cosine]
        count:
          type: integer
        created_at:
          type: string
          format: date-time

    CollectionList:
      type: object
      required: [collections]
      properties:
        collections:
          type: array
          items:
            $ref: "#/components/schemas/Collection"

    Record:
      type: object
      required: [id, vector, metadata]
      properties:
        id:
          type: string
        vector:
          type: array
          items:
            type: number
            format: float
        metadata:
          type: object
          additionalProperties: true
        document_ref:
          type: string
          description: Optional Forge Storage pointer

    RecordList:
      type: object
      required: [records, offset, limit]
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/Record"
        offset:
          type: integer
        limit:
          type: integer

    UpsertRequest:
      type: object
      required: [records]
      properties:
        records:
          type: array
          minItems: 1
          maxItems: 512
          items:
            $ref: "#/components/schemas/UpsertRecord"

    UpsertRecord:
      type: object
      required: [id, vector]
      properties:
        id:
          type: string
        vector:
          type: array
          items:
            type: number
            format: float
        metadata:
          type: object
          additionalProperties: true
          default: {}
        document_ref:
          type: string

    UpsertResponse:
      type: object
      required: [upserted]
      properties:
        upserted:
          type: integer
          minimum: 0

    QueryRequest:
      type: object
      required: [vector, top_k]
      properties:
        vector:
          type: array
          items:
            type: number
            format: float
        top_k:
          type: integer
          minimum: 1
          maximum: 100
        filter:
          type: object
          additionalProperties: true
          description: |
            Metadata predicates AND-ed together. Scalar values are equality;
            `{"$in":[...]}` matches any listed value.

    QueryResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/QueryHit"

    QueryHit:
      type: object
      required: [id, score, metadata]
      properties:
        id:
          type: string
        score:
          type: number
          format: float
          description: Cosine similarity (dot of L2-normalized vectors), descending
        metadata:
          type: object
          additionalProperties: true

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - not_found
            - conflict
            - invalid
            - invalid_name
            - invalid_project
            - dimension_mismatch
            - unavailable
            - corrupt
            - internal
          description: Machine-readable error code
