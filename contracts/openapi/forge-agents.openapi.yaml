openapi: 3.0.3
info:
  title: Forge Agents API
  version: 0.1.0
  description: |
    Platform agent runtime service (epic 15). Health/identity from 15.01;
    agent registry + YAML definitions from 15.02; tool registry + per-call
    permission checks from 15.03; run engine with limits and audit history
    from 15.04. Approval and CLI land in later steps.

    Internal tool invocation (used by the run engine) rejects with reasons:
    `unknown_tool`, `not_declared`, `permission_denied`, `invalid_arguments`.

    Runs are project-scoped via `X-Forge-Project`. Pass `"context":{"dry_run":true}`
    to use the deterministic fake model planner (CI / local without forge-models).
servers:
  - url: http://127.0.0.1:4301
    description: Local Compose (host port 4301)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when configuration and the agent registry loaded
        successfully at startup; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-agents
                language: python
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/agents:
    get:
      operationId: listAgents
      summary: List registered agents
      description: |
        Returns agent definitions loaded from YAML under `FORGE_AGENTS_DEFS_DIR`
        (default `services/forge-agents/agents`). Each entry includes model,
        declared tools, permissions, and execution limits.
      responses:
        "200":
          description: Agent registry listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
              example:
                agents:
                  - name: fixture-echo
                    model: local-general
                    tools: [echo.ping]
                    permissions: [project:read]
                    limits:
                      max_steps: 3
                      timeout_seconds: 30

  /v1/agents/{name}:
    get:
      operationId: getAgent
      summary: Get a registered agent by name
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
              example:
                name: fixture-echo
                model: local-general
                tools: [echo.ping]
                permissions: [project:read]
                limits:
                  max_steps: 3
                  timeout_seconds: 30
        "404":
          description: Unknown agent name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "agent not found: nope"
                code: agent_not_found

  /v1/tools:
    get:
      operationId: listTools
      summary: List registered tools
      description: |
        Returns tools from the in-process registry (`FORGE_AGENTS_TOOLS_MODE`).
        Each entry includes JSON Schema input/output, `destructive` flag, and
        `required_permissions` checked before every invocation.
      responses:
        "200":
          description: Tool registry listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
              example:
                tools:
                  - name: echo.ping
                    input_schema:
                      type: object
                      properties:
                        message:
                          type: string
                      required: [message]
                    output_schema:
                      type: object
                      properties:
                        echo:
                          type: string
                      required: [echo]
                    destructive: false
                    required_permissions: [project:read]

  /v1/agents/{name}/runs:
    post:
      operationId: startAgentRun
      summary: Start an agent run
      description: |
        Starts a bounded model+tool loop for the named agent. Returns 202 with
        `run_id` while the engine executes asynchronously. Limits come from the
        agent YAML (`max_steps`, `timeout_seconds`). Set `context.dry_run=true`
        for the deterministic fake model.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - $ref: "#/components/parameters/ForgeProject"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
            example:
              input: hello
              context:
                dry_run: true
      responses:
        "202":
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRunResponse"
              example:
                run_id: 11111111-1111-1111-1111-111111111111
                status: running
        "400":
          description: Missing project header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Unknown agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "429":
          description: Concurrent run cap exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/runs:
    get:
      operationId: listRuns
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ForgeProject"
      responses:
        "200":
          description: Project-scoped run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunListResponse"
        "400":
          description: Missing project header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/runs/{run_id}:
    get:
      operationId: getRun
      summary: Get run status and step history
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/ForgeProject"
      responses:
        "200":
          description: Run detail with ordered audit steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "400":
          description: Missing project header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "404":
          description: Unknown run or wrong project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /v1/runs/{run_id}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel a running agent run
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/ForgeProject"
      responses:
        "200":
          description: Cancel accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelRunResponse"
              example:
                status: cancelled
        "404":
          description: Unknown run or wrong project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "409":
          description: Run already terminal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

components:
  parameters:
    AgentName:
      name: name
      in: path
      required: true
      description: Agent name as declared in YAML (`name` field)
      schema:
        type: string
        minLength: 1
        pattern: "^[a-z][a-z0-9_-]*$"
      example: fixture-echo

    RunId:
      name: run_id
      in: path
      required: true
      description: Opaque run identifier returned by start
      schema:
        type: string
        minLength: 1
      example: 11111111-1111-1111-1111-111111111111

    ForgeProject:
      name: X-Forge-Project
      in: header
      required: true
      description: Project scope for the run (cross-project reads return 404)
      schema:
        type: string
        minLength: 1
      example: proj-a

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required:
        - status
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-agents
        language:
          type: string
          example: python
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          example: 12.5

    AgentLimits:
      type: object
      additionalProperties: false
      required:
        - max_steps
        - timeout_seconds
      properties:
        max_steps:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum model/tool loop iterations per run
          example: 10
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          description: Wall-clock run timeout in seconds
          example: 120

    Agent:
      type: object
      additionalProperties: false
      required:
        - name
        - model
        - tools
        - permissions
        - limits
      properties:
        name:
          type: string
          example: fixture-echo
        model:
          type: string
          description: Model id from forge-models registry
          example: local-general
        tools:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*(\\.[a-z][a-z0-9_-]*)+$"
          description: Declared tool ids (must exist in the tool registry to invoke)
          example: [echo.ping]
        permissions:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
          description: Declared permission scopes checked per tool call
          example: [project:read]
        limits:
          $ref: "#/components/schemas/AgentLimits"

    AgentListResponse:
      type: object
      additionalProperties: false
      required:
        - agents
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"

    JsonSchema:
      type: object
      description: JSON Schema (Draft 2020-12) document
      additionalProperties: true

    Tool:
      type: object
      additionalProperties: false
      required:
        - name
        - input_schema
        - output_schema
        - destructive
        - required_permissions
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9_-]*(\\.[a-z][a-z0-9_-]*)+$"
          example: echo.ping
        input_schema:
          $ref: "#/components/schemas/JsonSchema"
        output_schema:
          $ref: "#/components/schemas/JsonSchema"
        destructive:
          type: boolean
          description: When true, human approval is required before execute (15.06)
          example: false
        required_permissions:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
          description: Permissions that must be present on the run scope
          example: [project:read]

    ToolListResponse:
      type: object
      additionalProperties: false
      required:
        - tools
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"

    ToolInvokeDenialReason:
      type: string
      description: |
        Internal invocation rejection reasons (run engine / ToolInvoker).
        Distinct codes: unknown_tool (hallucination) vs not_declared (overreach).
      enum:
        - unknown_tool
        - not_declared
        - permission_denied
        - invalid_arguments

    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - error
        - code
      properties:
        error:
          type: string
        code:
          type: string
          description: |
            Machine-readable error code. Agent lookup uses `agent_not_found`.
            Tool invocation denials use ToolInvokeDenialReason values.
            Runs use `run_not_found`, `run_terminal`, `project_required`,
            `max_concurrent_runs`.
          example: agent_not_found
        status:
          type: string
          description: Present on some run cancel conflicts
          example: succeeded

    StartRunRequest:
      type: object
      additionalProperties: false
      properties:
        input:
          type: string
          description: Task/user input for the agent
          example: hello
        context:
          type: object
          additionalProperties: true
          description: |
            Opaque run context. Recognized keys include `dry_run` (bool),
            `force_loop` (bool; exhaust max_steps), `decide_delay_seconds` (number).
          example:
            dry_run: true

    StartRunResponse:
      type: object
      additionalProperties: false
      required:
        - run_id
        - status
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [running]

    CancelRunResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum: [cancelled]

    RunStep:
      type: object
      additionalProperties: false
      required:
        - type
        - ts
      properties:
        type:
          type: string
          enum: [model, tool, final]
          description: Audit step kind
        tool:
          type: string
          description: Tool name when type is tool
        args:
          type: object
          additionalProperties: true
        observation:
          description: Tool output, denial payload, or final text
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        decision:
          type: string
          description: Model decision JSON or invoker allow/deny
        ts:
          type: string
          format: date-time
          example: "2026-07-23T09:00:00Z"

    RunStatus:
      type: string
      enum: [running, succeeded, failed, cancelled, stopped]

    Run:
      type: object
      additionalProperties: false
      required:
        - run_id
        - project_id
        - agent
        - status
        - step_count
        - started_at
      properties:
        run_id:
          type: string
        project_id:
          type: string
        agent:
          type: string
        status:
          $ref: "#/components/schemas/RunStatus"
        step_count:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        result:
          type: string
          description: Final answer when status is succeeded
        error:
          type: string
          description: |
            Failure/stop reason. Common values: `max_steps_exceeded`, `timeout`,
            `cancelled`, tool deny reasons.
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RunStep"

    RunListResponse:
      type: object
      additionalProperties: false
      required:
        - runs
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/Run"
