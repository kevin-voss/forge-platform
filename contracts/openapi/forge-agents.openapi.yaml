openapi: 3.0.3
info:
  title: Forge Agents API
  version: 0.1.0
  description: |
    Platform agent runtime service (epic 15). Health/identity from 15.01;
    agent registry + YAML definitions from 15.02; tool registry + per-call
    permission checks from 15.03. Run engine, approval, and CLI land in later steps.

    Internal tool invocation (used by the run engine) rejects with reasons:
    `unknown_tool`, `not_declared`, `permission_denied`, `invalid_arguments`.
servers:
  - url: http://127.0.0.1:4301
    description: Local Compose (host port 4301)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when configuration and the agent registry loaded
        successfully at startup; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-agents
                language: python
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/agents:
    get:
      operationId: listAgents
      summary: List registered agents
      description: |
        Returns agent definitions loaded from YAML under `FORGE_AGENTS_DEFS_DIR`
        (default `services/forge-agents/agents`). Each entry includes model,
        declared tools, permissions, and execution limits.
      responses:
        "200":
          description: Agent registry listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
              example:
                agents:
                  - name: fixture-echo
                    model: local-general
                    tools: [echo.ping]
                    permissions: [project:read]
                    limits:
                      max_steps: 3
                      timeout_seconds: 30

  /v1/agents/{name}:
    get:
      operationId: getAgent
      summary: Get a registered agent by name
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
              example:
                name: fixture-echo
                model: local-general
                tools: [echo.ping]
                permissions: [project:read]
                limits:
                  max_steps: 3
                  timeout_seconds: 30
        "404":
          description: Unknown agent name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
              example:
                error: "agent not found: nope"
                code: agent_not_found

  /v1/tools:
    get:
      operationId: listTools
      summary: List registered tools
      description: |
        Returns tools from the in-process registry (`FORGE_AGENTS_TOOLS_MODE`).
        Each entry includes JSON Schema input/output, `destructive` flag, and
        `required_permissions` checked before every invocation.
      responses:
        "200":
          description: Tool registry listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
              example:
                tools:
                  - name: echo.ping
                    input_schema:
                      type: object
                      properties:
                        message:
                          type: string
                      required: [message]
                    output_schema:
                      type: object
                      properties:
                        echo:
                          type: string
                      required: [echo]
                    destructive: false
                    required_permissions: [project:read]

components:
  parameters:
    AgentName:
      name: name
      in: path
      required: true
      description: Agent name as declared in YAML (`name` field)
      schema:
        type: string
        minLength: 1
        pattern: "^[a-z][a-z0-9_-]*$"
      example: fixture-echo

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required:
        - status
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-agents
        language:
          type: string
          example: python
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          example: 12.5

    AgentLimits:
      type: object
      additionalProperties: false
      required:
        - max_steps
        - timeout_seconds
      properties:
        max_steps:
          type: integer
          minimum: 1
          maximum: 100
          description: Maximum model/tool loop iterations per run
          example: 10
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          description: Wall-clock run timeout in seconds
          example: 120

    Agent:
      type: object
      additionalProperties: false
      required:
        - name
        - model
        - tools
        - permissions
        - limits
      properties:
        name:
          type: string
          example: fixture-echo
        model:
          type: string
          description: Model id from forge-models registry
          example: local-general
        tools:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*(\\.[a-z][a-z0-9_-]*)+$"
          description: Declared tool ids (must exist in the tool registry to invoke)
          example: [echo.ping]
        permissions:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
          description: Declared permission scopes checked per tool call
          example: [project:read]
        limits:
          $ref: "#/components/schemas/AgentLimits"

    AgentListResponse:
      type: object
      additionalProperties: false
      required:
        - agents
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"

    JsonSchema:
      type: object
      description: JSON Schema (Draft 2020-12) document
      additionalProperties: true

    Tool:
      type: object
      additionalProperties: false
      required:
        - name
        - input_schema
        - output_schema
        - destructive
        - required_permissions
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9_-]*(\\.[a-z][a-z0-9_-]*)+$"
          example: echo.ping
        input_schema:
          $ref: "#/components/schemas/JsonSchema"
        output_schema:
          $ref: "#/components/schemas/JsonSchema"
        destructive:
          type: boolean
          description: When true, human approval is required before execute (15.06)
          example: false
        required_permissions:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*:[a-z][a-z0-9_-]*$"
          description: Permissions that must be present on the run scope
          example: [project:read]

    ToolListResponse:
      type: object
      additionalProperties: false
      required:
        - tools
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"

    ToolInvokeDenialReason:
      type: string
      description: |
        Internal invocation rejection reasons (run engine / ToolInvoker).
        Distinct codes: unknown_tool (hallucination) vs not_declared (overreach).
      enum:
        - unknown_tool
        - not_declared
        - permission_denied
        - invalid_arguments

    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - error
        - code
      properties:
        error:
          type: string
        code:
          type: string
          description: |
            Machine-readable error code. Agent lookup uses `agent_not_found`.
            Tool invocation denials use ToolInvokeDenialReason values.
          example: agent_not_found
