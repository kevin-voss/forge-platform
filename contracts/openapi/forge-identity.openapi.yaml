openapi: 3.0.3
info:
  title: Forge Identity API
  version: 0.1.0
  description: |
    Platform identity service skeleton (epic 09 / step 09.01).
    Declares the runtime-contract health and identity surfaces; domain APIs arrive in 09.02+.
servers:
  - url: http://127.0.0.1:4002
    description: Local Compose (host port 4002)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when the database is reachable and baseline migrations are applied;
        non-200 when not ready.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (DB unreachable or migrations pending/failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-identity
                language: kotlin
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

components:
  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string
          description: Short health indicator (e.g. live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          description: Logical service name
          example: forge-identity
        language:
          type: string
          description: Implementation language
          example: kotlin
        status:
          type: string
          description: Runtime status
          example: running
        version:
          type: string
          description: Optional service version
          example: 0.1.0
        uptime_seconds:
          type: number
          description: Optional seconds since process start
          example: 12.5
