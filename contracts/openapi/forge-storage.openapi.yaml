openapi: 3.0.3
info:
  title: Forge Storage API
  version: 0.2.0
  description: |
    Platform object storage service (epic 13). Health/identity from 13.01;
    project-scoped bucket APIs and metadata index from 13.02. Streamed
    upload/download, integrity, signed tokens, and quotas arrive in later steps.
servers:
  - url: http://127.0.0.1:4107
    description: Local Compose (host port 4107)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when `FORGE_STORAGE_ROOT` exists, contains `objects/` and
        `meta/`, is writable, and the metadata SQLite index is open; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (storage root missing, unwritable, or security check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-storage
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/buckets:
    post:
      operationId: createBucket
      summary: Create a bucket
      description: |
        Creates a project-scoped bucket. Project context comes from
        `Authorization: Bearer` (Identity, enforce mode) or `X-Forge-Project`
        (dev mode).
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBucketRequest"
            example:
              name: artifacts
      responses:
        "201":
          description: Bucket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bucket"
        "400":
          description: Invalid bucket name or missing project context (dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bucket name already exists in the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listBuckets
      summary: List buckets for the caller's project
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
      responses:
        "200":
          description: Buckets visible to the caller's project only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketList"
        "400":
          description: Missing project context (dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/buckets/{bucket}:
    get:
      operationId: getBucket
      summary: Get a bucket by name
      description: |
        Returns 404 when the bucket does not exist in the caller's project
        (including cross-project addresses — no existence leak).
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
      responses:
        "200":
          description: Bucket found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bucket"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBucket
      summary: Delete an empty bucket
      description: |
        Deletes the bucket when it contains no objects. Non-empty buckets return
        409 with `object_count` (cascade delete lands in 13.06).
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
      responses:
        "204":
          description: Bucket deleted
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bucket is not empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "bucket not empty: 1 object(s)"
                code: conflict
                object_count: 1

components:
  parameters:
    ForgeProjectHeader:
      name: X-Forge-Project
      in: header
      required: false
      description: |
        Project id for isolation. Required in `FORGE_AUTH_MODE=dev`. In enforce
        mode, project is taken from the Identity token (header used only when
        the token has memberships but no scoped `project_id`).
      schema:
        type: string
        example: proj-a
    BucketName:
      name: bucket
      in: path
      required: true
      description: Bucket name (`a-z0-9-`, 3–63 characters)
      schema:
        type: string
        minLength: 3
        maxLength: 63
        pattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
        example: artifacts

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-storage
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double

    CreateBucketRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 63
          pattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
          example: artifacts

    Bucket:
      type: object
      required: [id, project_id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          example: proj-a
        name:
          type: string
          example: artifacts
        created_at:
          type: string
          format: date-time

    BucketList:
      type: object
      required: [buckets]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/Bucket"

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          example: not_found
        object_count:
          type: integer
          description: Present when deleting a non-empty bucket
