openapi: 3.0.3
info:
  title: Forge Storage API
  version: 0.6.0
  description: |
    Platform object storage service (epic 13). Health/identity from 13.01;
    project-scoped bucket APIs and metadata index from 13.02; streamed object
    upload/download from 13.03; SHA-256 integrity, content-addressed layout,
    and HTTP byte-range requests from 13.04; HMAC-signed object access tokens
    with expiry from 13.05; per-project quotas, hard delete with refcount GC,
    usage reporting, and restart durability from 13.06.
servers:
  - url: http://127.0.0.1:4107
    description: Local Compose (host port 4107)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when `FORGE_STORAGE_ROOT` exists, contains `objects/` and
        `meta/`, is writable, and the metadata SQLite index is open; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (storage root missing, unwritable, or security check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-storage
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

  /v1/buckets:
    post:
      operationId: createBucket
      summary: Create a bucket
      description: |
        Creates a project-scoped bucket. Project context comes from
        `Authorization: Bearer` (Identity, enforce mode) or `X-Forge-Project`
        (dev mode).
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBucketRequest"
            example:
              name: artifacts
      responses:
        "201":
          description: Bucket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bucket"
        "400":
          description: Invalid bucket name or missing project context (dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bucket name already exists in the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listBuckets
      summary: List buckets for the caller's project
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
      responses:
        "200":
          description: Buckets visible to the caller's project only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketList"
        "400":
          description: Missing project context (dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/buckets/{bucket}:
    get:
      operationId: getBucket
      summary: Get a bucket by name
      description: |
        Returns 404 when the bucket does not exist in the caller's project
        (including cross-project addresses — no existence leak).
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
      responses:
        "200":
          description: Bucket found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bucket"
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBucket
      summary: Delete a bucket
      description: |
        Deletes an empty bucket (`204`). Non-empty buckets return `409` with
        `object_count` unless `force=true`, which cascade-deletes all objects
        (refcount-aware blob GC) then the bucket.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - name: force
          in: query
          required: false
          description: When true, delete all objects then the bucket
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Bucket deleted (empty, or cascade with force=true)
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bucket is not empty and force was not set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "bucket not empty: 1 object(s)"
                code: conflict
                object_count: 1

  /v1/usage:
    get:
      operationId: getProjectUsage
      summary: Report project storage usage vs quota
      description: |
        Returns bytes used, effective quota, and object count for the caller's
        project. Quota is the per-project override when set, otherwise
        `FORGE_STORAGE_DEFAULT_QUOTA_BYTES`.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
      responses:
        "200":
          description: Usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Usage"
              example:
                project_id: proj-a
                used_bytes: 1048576
                quota_bytes: 1073741824
                objects: 3
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Metadata store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/buckets/{bucket}/objects/{key}/sign:
    post:
      operationId: signObjectAccess
      summary: Issue a signed access token for an object
      description: |
        Returns a short-lived HMAC-SHA256 signed token scoped to a single
        object and HTTP method (`GET` or `PUT`). Clients may then call GET/PUT
        with `?token=` or `Authorization: Bearer <token>` without project
        credentials. TTL is rejected when greater than
        `FORGE_STORAGE_MAX_TTL_SECONDS`.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - $ref: "#/components/parameters/ObjectKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignObjectRequest"
            example:
              method: GET
              ttl_seconds: 300
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignObjectResponse"
        "400":
          description: Invalid method, TTL, or project context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                ttlTooLarge:
                  value:
                    error: "ttl_seconds exceeds maximum of 3600"
                    code: ttl_too_large
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Signing key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: signing key not configured
                code: signing_unavailable

  /v1/buckets/{bucket}/objects/{key}:
    put:
      operationId: putObject
      summary: Stream-upload an object
      description: |
        Streams the request body to a temporary file while computing SHA-256,
        fsyncs, then places the blob under the content-addressed path
        `objects/<aa>/<sha256>` (dedup when the blob already exists). Optional
        `X-Expected-SHA256` rejects mismatches with 422 without storing the object.
        May be authorized with a PUT-scoped signed token via `?token=` or
        `Authorization: Bearer`.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - $ref: "#/components/parameters/ObjectKey"
        - $ref: "#/components/parameters/ExpectedSha256"
        - $ref: "#/components/parameters/SignedAccessToken"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          "*/*":
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Object created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Object"
        "200":
          description: Object overwritten
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Object"
        "400":
          description: Invalid object key or missing project context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: |
            Missing/invalid Identity bearer (enforce mode), or invalid/expired
            signed access token (`invalid_token` / `token_expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                tokenExpired:
                  value:
                    error: token expired
                    code: token_expired
        "403":
          description: Signed token method or scope mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: token method does not match request
                code: method_mismatch
        "404":
          description: Bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: |
            Object exceeds `FORGE_STORAGE_MAX_OBJECT_BYTES` when set (`too_large`),
            or the upload would exceed the project's byte quota (`quota_exceeded`).
            Quota rejections do not commit metadata; temp/new blobs are cleaned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                tooLarge:
                  value:
                    error: "object exceeds max size of 1048576 bytes"
                    code: too_large
                quotaExceeded:
                  value:
                    error: "quota exceeded: used=12 incoming=12 quota=20"
                    code: quota_exceeded
        "422":
          description: Client `X-Expected-SHA256` did not match streamed content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "checksum mismatch: expected …, got …"
                code: checksum_mismatch
    delete:
      operationId: deleteObject
      summary: Delete an object
      description: |
        Removes object metadata and decrements the content-addressed blob
        refcount. When the refcount reaches zero the on-disk blob is unlinked
        (dedup-safe GC). Cross-project deletes return `404`.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - $ref: "#/components/parameters/ObjectKey"
      responses:
        "204":
          description: Object deleted
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getObject
      summary: Stream-download an object
      description: |
        Streams object bytes from the local filesystem. Returns `ETag` /
        `X-Content-SHA256` and `Accept-Ranges: bytes`. Supports a single
        `Range: bytes=` request (`206 Partial Content`). When
        `FORGE_STORAGE_VERIFY_ON_READ=full`, re-hashes the on-disk blob and
        returns `500` with `integrity_error` on mismatch. May be authorized
        with a GET-scoped signed token via `?token=` or `Authorization: Bearer`.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - $ref: "#/components/parameters/ObjectKey"
        - $ref: "#/components/parameters/Range"
        - $ref: "#/components/parameters/SignedAccessToken"
      responses:
        "200":
          description: Full object bytes
          headers:
            Content-Type:
              schema:
                type: string
              description: Stored content type (default application/octet-stream)
            Content-Length:
              schema:
                type: integer
                format: int64
              description: Object size in bytes
            ETag:
              schema:
                type: string
              description: Quoted SHA-256 hex digest
              example: '"2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"'
            X-Content-SHA256:
              schema:
                type: string
              description: Lowercase SHA-256 hex digest
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            "*/*":
              schema:
                type: string
                format: binary
        "206":
          description: Partial content for a satisfiable Range
          headers:
            Content-Type:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
                format: int64
              description: Length of the returned range
            Content-Range:
              schema:
                type: string
              example: bytes 0-1023/5000
            ETag:
              schema:
                type: string
            X-Content-SHA256:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: |
            Missing/invalid Identity bearer (enforce mode), or invalid/expired
            signed access token (`invalid_token` / `token_expired`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Signed token method or scope mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object or bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Range Not Satisfiable
          headers:
            Content-Range:
              schema:
                type: string
              example: bytes */5000
              description: Unsatisfiable range marker with total size
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
        "500":
          description: On-disk integrity failure (verify-on-read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: object integrity check failed
                code: integrity_error
    head:
      operationId: headObject
      summary: Object metadata headers
      description: |
        Returns `Content-Type`, `Content-Length`, `ETag`, `X-Content-SHA256`,
        and `Accept-Ranges` without a body.
      parameters:
        - $ref: "#/components/parameters/ForgeProjectHeader"
        - $ref: "#/components/parameters/BucketName"
        - $ref: "#/components/parameters/ObjectKey"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Object exists
          headers:
            Content-Type:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
                format: int64
            ETag:
              schema:
                type: string
            X-Content-SHA256:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
        "206":
          description: Range metadata without body
          headers:
            Content-Length:
              schema:
                type: integer
                format: int64
            Content-Range:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
        "401":
          description: Missing/invalid bearer token (enforce mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object or bucket not found in caller's project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Range Not Satisfiable
          headers:
            Content-Range:
              schema:
                type: string

components:
  parameters:
    ForgeProjectHeader:
      name: X-Forge-Project
      in: header
      required: false
      description: |
        Project id for isolation. Required in `FORGE_AUTH_MODE=dev`. In enforce
        mode, project is taken from the Identity token (header used only when
        the token has memberships but no scoped `project_id`).
      schema:
        type: string
        example: proj-a
    BucketName:
      name: bucket
      in: path
      required: true
      description: Bucket name (`a-z0-9-`, 3–63 characters)
      schema:
        type: string
        minLength: 3
        maxLength: 63
        pattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
        example: artifacts
    ObjectKey:
      name: key
      in: path
      required: true
      description: |
        Object key (1–1024 characters). Must not start with `/`, contain NUL, or
        include `..` path segments. Nested keys such as `dir/file.bin` are allowed.
      schema:
        type: string
        minLength: 1
        maxLength: 1024
        example: path/to/object.bin
    ExpectedSha256:
      name: X-Expected-SHA256
      in: header
      required: false
      description: |
        Optional client-declared SHA-256 (64 hex chars). When present, the
        server rejects the upload with 422 if the streamed content hash differs.
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{64}$'
        example: 2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
    Range:
      name: Range
      in: header
      required: false
      description: |
        Single byte range (`bytes=start-end`, `bytes=start-`, or `bytes=-suffix`).
        Multi-range requests are not supported.
      schema:
        type: string
        example: bytes=0-1023
    SignedAccessToken:
      name: token
      in: query
      required: false
      description: |
        HMAC-signed object access token from `POST .../sign`. Alternative to
        project credentials for GET/PUT on the scoped object. May also be sent
        as `Authorization: Bearer <token>`.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-storage
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double

    CreateBucketRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 63
          pattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
          example: artifacts

    Bucket:
      type: object
      required: [id, project_id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          example: proj-a
        name:
          type: string
          example: artifacts
        created_at:
          type: string
          format: date-time

    BucketList:
      type: object
      required: [buckets]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/Bucket"

    SignObjectRequest:
      type: object
      required: [method, ttl_seconds]
      properties:
        method:
          type: string
          enum: [GET, PUT]
          example: GET
        ttl_seconds:
          type: integer
          format: int64
          minimum: 1
          example: 300

    SignObjectResponse:
      type: object
      required: [token, url, expires_at]
      properties:
        token:
          type: string
          description: URL-safe base64 payload + HMAC signature
        url:
          type: string
          description: Path-absolute URL including `?token=`
          example: /v1/buckets/artifacts/objects/big.bin?token=...
        expires_at:
          type: string
          format: date-time

    Usage:
      type: object
      required: [project_id, used_bytes, quota_bytes, objects]
      properties:
        project_id:
          type: string
          example: proj-a
        used_bytes:
          type: integer
          format: int64
          description: Sum of object size_bytes for the project
          example: 1048576
        quota_bytes:
          type: integer
          format: int64
          description: Effective quota (override or default)
          example: 1073741824
        objects:
          type: integer
          format: int64
          description: Number of objects in the project
          example: 3

    Object:
      type: object
      required:
        - id
        - project_id
        - bucket_id
        - key
        - size_bytes
        - sha256
        - storage_path
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          example: proj-a
        bucket_id:
          type: string
          format: uuid
        key:
          type: string
          example: path/to/object.bin
        size_bytes:
          type: integer
          format: int64
          example: 1024
        sha256:
          type: string
          description: Lowercase SHA-256 hex digest of object bytes
          example: 2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
        content_type:
          type: string
          nullable: true
          example: application/octet-stream
        storage_path:
          type: string
          description: Relative content-addressed path under objects/ (`<aa>/<sha256>`)
          example: 2c/2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
          example: not_found
          enum:
            - not_found
            - conflict
            - invalid
            - invalid_key
            - too_large
            - quota_exceeded
            - checksum_mismatch
            - integrity_error
            - unavailable
            - internal
            - invalid_token
            - token_expired
            - method_mismatch
            - scope_mismatch
            - ttl_too_large
            - invalid_method
            - invalid_ttl
            - signing_unavailable
            - unauthenticated
        object_count:
          type: integer
          description: Present when deleting a non-empty bucket without force=true
