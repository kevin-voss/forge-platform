openapi: 3.0.3
info:
  title: Forge Storage API
  version: 0.1.0
  description: |
    Platform object storage service (epic 13). Skeleton health and identity surfaces
    from 13.01; buckets, streamed upload/download, integrity, signed tokens, and
    quotas arrive in later steps.
servers:
  - url: http://127.0.0.1:4107
    description: Local Compose (host port 4107)

paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      description: Returns 200 when the process is alive.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: live

  /health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      description: |
        Returns 200 when `FORGE_STORAGE_ROOT` exists, contains `objects/` and
        `meta/`, and is writable; 503 otherwise.
      responses:
        "200":
          description: Ready to receive traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ready
        "503":
          description: Not ready (storage root missing, unwritable, or security check failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: not_ready

  /:
    get:
      operationId: getIdentity
      summary: Service identity
      description: |
        Returns JSON identity for the running service. Required fields match the
        epic-01 runtime contract: service, language, status.
      responses:
        "200":
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
              example:
                service: forge-storage
                language: rust
                status: running
                version: 0.1.0
                uptime_seconds: 12.5

components:
  schemas:
    HealthStatus:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status:
          type: string
          description: Short health indicator (live, ready, not_ready)

    Identity:
      type: object
      required:
        - service
        - language
        - status
      properties:
        service:
          type: string
          example: forge-storage
        language:
          type: string
          example: rust
        status:
          type: string
          example: running
        version:
          type: string
          example: 0.1.0
        uptime_seconds:
          type: number
          format: double
