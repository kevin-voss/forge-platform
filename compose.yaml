name: forge-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    ports:
      - "5001:5432"
    volumes:
      - forge-postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    container_name: forge-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "5002:4222"
      - "5003:8222"
    volumes:
      - ./infrastructure/nats/nats.conf:/etc/nats/nats.conf:ro
      - forge-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  registry:
    image: registry:2
    container_name: forge-registry
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    ports:
      - "5000:5000"
    volumes:
      - forge-registry-data:/var/lib/registry
      - ./infrastructure/registry/config.yml:/etc/docker/registry/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/v2/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: forge-otel-collector
    restart: unless-stopped
    command: ["--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "13133:13133"
    volumes:
      - ./infrastructure/otel/config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:13133/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: forge-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "3001:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - forge-prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.6.1
    container_name: forge-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3002:3200"
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - forge-tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.2.1
    container_name: forge-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3003:3100"
    volumes:
      - ./infrastructure/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - forge-loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.1
    container_name: forge-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      FORGE_GRAFANA_DASHBOARD_DIR: /etc/grafana/forge-dashboards
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/etc/grafana/forge-dashboards:ro
      - forge-grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  forge-gateway:
    build:
      context: ./services/forge-gateway
    image: forge/forge-gateway:local
    container_name: forge-gateway
    restart: unless-stopped
    ports:
      - "4000:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-gateway
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      # Route sync (05.03): Control /v1/endpoints primary; Runtime node state interim.
      FORGE_CONTROL_URL: ${FORGE_CONTROL_URL-http://forge-control:8080}
      FORGE_RUNTIME_URL: ${FORGE_RUNTIME_URL-http://forge-runtime:8080}
      FORGE_ROUTE_SOURCE: ${FORGE_ROUTE_SOURCE:-control}
      FORGE_ROUTE_SYNC_INTERVAL_SECONDS: ${FORGE_ROUTE_SYNC_INTERVAL_SECONDS:-10}
      # Empty → gateway default `{service}.{project}.demo.localhost`.
      # Quote so values like `{service}.demo.localhost` are not parsed as YAML flow mappings.
      FORGE_HOST_PATTERN: "${FORGE_HOST_PATTERN-}"
      # Published workload ports bind on the Docker host; reach them from the gateway container.
      FORGE_UPSTREAM_HOST: ${FORGE_UPSTREAM_HOST:-host.docker.internal}
      # Health-aware upstreams (05.04)
      FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS: ${FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS:-5}
      FORGE_UPSTREAM_PROBE_PATH: ${FORGE_UPSTREAM_PROBE_PATH:-/health/ready}
      FORGE_UPSTREAM_FAILURE_THRESHOLD: ${FORGE_UPSTREAM_FAILURE_THRESHOLD:-3}
      FORGE_UPSTREAM_SUCCESS_THRESHOLD: ${FORGE_UPSTREAM_SUCCESS_THRESHOLD:-2}
      FORGE_UPSTREAM_TRUST_RUNTIME_STATUS: ${FORGE_UPSTREAM_TRUST_RUNTIME_STATUS:-true}
      # Request IDs, forwarded headers, timeouts (05.05)
      FORGE_REQUEST_ID_HEADER: ${FORGE_REQUEST_ID_HEADER:-X-Request-Id}
      FORGE_PROXY_CONNECT_TIMEOUT_SECONDS: ${FORGE_PROXY_CONNECT_TIMEOUT_SECONDS:-5}
      FORGE_PROXY_RESPONSE_HEADER_TIMEOUT_SECONDS: ${FORGE_PROXY_RESPONSE_HEADER_TIMEOUT_SECONDS:-15}
      FORGE_PROXY_OVERALL_TIMEOUT_SECONDS: ${FORGE_PROXY_OVERALL_TIMEOUT_SECONDS:-30}
      FORGE_TRUST_INBOUND_XFF: ${FORGE_TRUST_INBOUND_XFF:-false}
      # WebSocket + SSE proxy (05.06)
      FORGE_WS_ENABLED: ${FORGE_WS_ENABLED:-true}
      FORGE_SSE_ENABLED: ${FORGE_SSE_ENABLED:-true}
      FORGE_WS_IDLE_TIMEOUT_SECONDS: ${FORGE_WS_IDLE_TIMEOUT_SECONDS:-300}
      FORGE_STREAM_READ_TIMEOUT_SECONDS: ${FORGE_STREAM_READ_TIMEOUT_SECONDS:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      forge-control:
        condition: service_healthy
      forge-runtime:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  forge-control:
    build:
      context: ./services/forge-control
    image: forge/forge-control:local
    container_name: forge-control
    restart: unless-stopped
    ports:
      - "4001:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-control
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      FORGE_ENV: ${FORGE_ENV:-development}
      # Default enforce (09.06). Pre-09 demos must set FORGE_AUTH_MODE=dev explicitly.
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-enforce}
      FORGE_IDENTITY_URL: ${FORGE_IDENTITY_URL:-http://forge-identity:8080}
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-10}
      FORGE_AUTHZ_CACHE_TTL_S: ${FORGE_AUTHZ_CACHE_TTL_S:-10}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      DATABASE_URL: jdbc:postgresql://postgres:5432/forge
      DATABASE_USER: ${POSTGRES_USER:-forge}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      DATABASE_SCHEMA: control
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      DATABASE_MIGRATE_ON_START: ${DATABASE_MIGRATE_ON_START:-true}
      FORGE_RECONCILE_ENABLED: ${FORGE_RECONCILE_ENABLED:-true}
      FORGE_RECONCILE_INTERVAL_MS: ${FORGE_RECONCILE_INTERVAL_MS:-2000}
      FORGE_RECONCILE_MAX_ACTIONS_PER_TICK: ${FORGE_RECONCILE_MAX_ACTIONS_PER_TICK:-5}
      # Optional global rollout overrides (unset → per-deployment defaults).
      FORGE_ROLLOUT_BATCH_SIZE: ${FORGE_ROLLOUT_BATCH_SIZE:-}
      FORGE_ROLLOUT_TIMEOUT_S: ${FORGE_ROLLOUT_TIMEOUT_S:-}
      # In-compose Runtime listens on 8080 (host maps 4102:8080).
      FORGE_RUNTIME_URL: ${FORGE_RUNTIME_URL:-http://forge-runtime:8080}
      FORGE_GATEWAY_URL: ${FORGE_GATEWAY_URL:-http://forge-gateway:8080}
      # Secrets resolve for runtime injection at deploy (10.04)
      FORGE_SECRETS_URL: ${FORGE_SECRETS_URL:-http://forge-secrets:8080}
      FORGE_SECRETS_SERVICE_ACCOUNT: ${FORGE_SECRETS_SERVICE_ACCOUNT:-}
      FORGE_INJECT_MASK_IN_LOGS: ${FORGE_INJECT_MASK_IN_LOGS:-true}
      FORGE_READINESS_POLL_MS: ${FORGE_READINESS_POLL_MS:-1000}
      FORGE_READINESS_MAX_WAIT_S: ${FORGE_READINESS_MAX_WAIT_S:-60}
      # Multi-node fleet liveness (08.02)
      FORGE_NODE_HEARTBEAT_TIMEOUT_S: ${FORGE_NODE_HEARTBEAT_TIMEOUT_S:-15}
      FORGE_LIVENESS_INTERVAL_MS: ${FORGE_LIVENESS_INTERVAL_MS:-5000}
      FORGE_NODE_STRICT_REGISTER: ${FORGE_NODE_STRICT_REGISTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-identity:
    build:
      context: ./services/forge-identity
    image: forge/forge-identity:local
    container_name: forge-identity
    restart: unless-stopped
    ports:
      - "4002:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-identity
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      FORGE_IDENTITY_DB_URL: jdbc:postgresql://postgres:5432/forge_identity
      FORGE_IDENTITY_DB_USER: ${POSTGRES_USER:-forge}
      FORGE_IDENTITY_DB_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      FORGE_IDENTITY_DB_POOL_MAX: ${FORGE_IDENTITY_DB_POOL_MAX:-10}
      FORGE_IDENTITY_DB_MIGRATE_ON_START: ${FORGE_IDENTITY_DB_MIGRATE_ON_START:-true}
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-runtime:
    build:
      context: ./services/forge-runtime
    image: forge/forge-runtime:local
    container_name: forge-runtime
    restart: unless-stopped
    ports:
      - "4102:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-runtime
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      FORGE_DOCKER_STARTUP_RETRIES: ${FORGE_DOCKER_STARTUP_RETRIES:-5}
      FORGE_DOCKER_STARTUP_RETRY_DELAY_MS: ${FORGE_DOCKER_STARTUP_RETRY_DELAY_MS:-500}
      FORGE_RUNTIME_DATA_DIR: ${FORGE_RUNTIME_DATA_DIR:-/var/lib/forge-runtime}
      FORGE_HEARTBEAT_INTERVAL_SECONDS: ${FORGE_HEARTBEAT_INTERVAL_SECONDS:-10}
      # Control fleet registration (08.02); override FORGE_NODE_ID for multi-agent demos.
      FORGE_NODE_ID: ${FORGE_NODE_ID:-node-local}
      FORGE_NODE_SLOTS: ${FORGE_NODE_SLOTS:-4}
      FORGE_NODE_ADDRESS: ${FORGE_NODE_ADDRESS:-http://forge-runtime:8080}
      FORGE_HEARTBEAT_INTERVAL_MS: ${FORGE_HEARTBEAT_INTERVAL_MS:-5000}
      FORGE_PULL_TIMEOUT_SECONDS: ${FORGE_PULL_TIMEOUT_SECONDS:-120}
      FORGE_DEFAULT_REGISTRY: ${FORGE_DEFAULT_REGISTRY:-localhost:5000}
      FORGE_PROBE_INTERVAL_SECONDS: ${FORGE_PROBE_INTERVAL_SECONDS:-5}
      FORGE_PROBE_TIMEOUT_SECONDS: ${FORGE_PROBE_TIMEOUT_SECONDS:-2}
      FORGE_PROBE_FAILURE_THRESHOLD: ${FORGE_PROBE_FAILURE_THRESHOLD:-3}
      FORGE_PROBE_READY_PATH: ${FORGE_PROBE_READY_PATH:-/health/ready}
      FORGE_PROBE_LIVE_PATH: ${FORGE_PROBE_LIVE_PATH:-/health/live}
      # Reach published host ports on the Docker host from inside this container.
      FORGE_PROBE_HOST: ${FORGE_PROBE_HOST:-host.docker.internal}
      FORGE_LOG_DEFAULT_TAIL: ${FORGE_LOG_DEFAULT_TAIL:-100}
      FORGE_LOG_STREAM_BUFFER: ${FORGE_LOG_STREAM_BUFFER:-8192}
      FORGE_STOP_GRACE_SECONDS: ${FORGE_STOP_GRACE_SECONDS:-10}
      FORGE_ON_CONFIG_CONFLICT: ${FORGE_ON_CONFIG_CONFLICT:-recreate}
      # Desired→actual reconcile against Control (skip cycles when Control is down).
      # Use ${VAR-default} (no ':') so an explicit empty value disables reconcile in tests.
      FORGE_CONTROL_URL: ${FORGE_CONTROL_URL-http://forge-control:8080}
      FORGE_RECONCILE_INTERVAL_SECONDS: ${FORGE_RECONCILE_INTERVAL_SECONDS:-10}
      FORGE_CONTROL_REPORT_MODE: ${FORGE_CONTROL_REPORT_MODE:-push}
      # Epic 07: Control owns create/stop; demos 04–06 set FORGE_LIFECYCLE_OWNER=runtime.
      FORGE_LIFECYCLE_OWNER: ${FORGE_LIFECYCLE_OWNER:-control}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Privileged local-dev mount — grants broad host control; harden later.
      - /var/run/docker.sock:/var/run/docker.sock
      - forge-runtime-data:/var/lib/forge-runtime
    # Socket is typically root:root mode 660 inside the container on Docker Desktop.
    # Run as root for this privileged local-dev mount (documented; harden later).
    user: "0:0"
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      forge-control:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-events:
    build:
      context: .
      dockerfile: services/forge-events/Dockerfile
    image: forge/forge-events:local
    container_name: forge-events
    restart: unless-stopped
    ports:
      - "4105:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-events
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_NATS_URL: ${FORGE_NATS_URL:-nats://nats:4222}
      FORGE_EVENTS_STREAMS: ${FORGE_EVENTS_STREAMS:-build,deployment,runtime,application,agent}
      FORGE_DEFAULT_ACK_WAIT_S: ${FORGE_DEFAULT_ACK_WAIT_S:-30}
      FORGE_DEFAULT_MAX_DELIVERIES: ${FORGE_DEFAULT_MAX_DELIVERIES:-5}
      FORGE_ACK_TOKEN_TTL_S: ${FORGE_ACK_TOKEN_TTL_S:-60}
      FORGE_DLQ_ENABLED: ${FORGE_DLQ_ENABLED:-true}
      FORGE_DLQ_RETENTION_DAYS: ${FORGE_DLQ_RETENTION_DAYS:-7}
      FORGE_EVENT_SCHEMA_DIR: ${FORGE_EVENT_SCHEMA_DIR:-/contracts/events}
      FORGE_SCHEMA_VALIDATION: ${FORGE_SCHEMA_VALIDATION:-strict}
      FORGE_DEDUP_WINDOW_S: ${FORGE_DEDUP_WINDOW_S:-120}
      FORGE_SEEN_STORE_TTL_S: ${FORGE_SEEN_STORE_TTL_S:-86400}
      FORGE_EVENTS_DB_URL: ${FORGE_EVENTS_DB_URL:-postgres://forge:forge@postgres:5432/forge_events}
      # Default dev so demos stay unauthenticated; set enforce for Identity-bound consumers.
      FORGE_AUTH_MODE: ${FORGE_EVENTS_AUTH_MODE:-dev}
      FORGE_IDENTITY_URL: ${FORGE_IDENTITY_URL:-http://forge-identity:8080}
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-10}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
    volumes:
      - ./contracts/events:/contracts/events:ro
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-observe:
    build:
      context: .
      dockerfile: services/forge-observe/Dockerfile
    image: forge/forge-observe:local
    container_name: forge-observe
    restart: unless-stopped
    ports:
      - "4106:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-observe
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_LOKI_URL: ${FORGE_LOKI_URL:-http://loki:3100}
      FORGE_TEMPO_URL: ${FORGE_TEMPO_URL:-http://tempo:3200}
      FORGE_PROMETHEUS_URL: ${FORGE_PROMETHEUS_URL:-http://prometheus:9090}
      FORGE_BACKEND_TIMEOUT_MS: ${FORGE_BACKEND_TIMEOUT_MS:-2000}
      FORGE_OBSERVE_READY_REQUIRE_BACKENDS: ${FORGE_OBSERVE_READY_REQUIRE_BACKENDS:-loki,tempo,prometheus}
      FORGE_LOG_QUERY_MAX_LIMIT: ${FORGE_LOG_QUERY_MAX_LIMIT:-1000}
      FORGE_LOG_QUERY_MAX_RANGE_H: ${FORGE_LOG_QUERY_MAX_RANGE_H:-24}
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      FORGE_IDENTITY_URL: ${FORGE_IDENTITY_URL:-http://forge-identity:4002}
      FORGE_AUTHZ_CACHE_TTL_S: ${FORGE_AUTHZ_CACHE_TTL_S:-10}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-secrets:
    build:
      context: ./services/forge-secrets
    image: forge/forge-secrets:local
    container_name: forge-secrets
    restart: unless-stopped
    ports:
      - "4104:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-secrets
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      FORGE_SECRETS_DB_URL: postgres://forge:forge@postgres:5432/forge_secrets
      FORGE_SECRETS_MASTER_KEY: ${FORGE_SECRETS_MASTER_KEY:-bG9jYWwtZGV2LWZvcmdlLXNlY3JldHMta2V5ISEhISE=}
      FORGE_SECRETS_MASTER_KEY_ID: ${FORGE_SECRETS_MASTER_KEY_ID:-m1}
      # Default enforce (10.03). Pre-auth store tests / demos may set FORGE_AUTH_MODE=dev.
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-enforce}
      FORGE_IDENTITY_URL: ${FORGE_IDENTITY_URL:-http://forge-identity:8080}
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-10}
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  forge-build:
    build:
      context: ./services/forge-build
    image: forge/forge-build:local
    container_name: forge-build
    restart: unless-stopped
    ports:
      - "4103:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-build
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: ${FORGE_ENV:-development}
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      FORGE_BUILD_WORKSPACE_DIR: ${FORGE_BUILD_WORKSPACE_DIR:-/workspace}
      FORGE_BUILD_STORE_DIR: ${FORGE_BUILD_STORE_DIR:-/var/lib/forge-build}
      FORGE_BUILD_RETENTION_HOURS: ${FORGE_BUILD_RETENTION_HOURS:-72}
      FORGE_BUILD_CLEANUP_ON_START: ${FORGE_BUILD_CLEANUP_ON_START:-true}
      FORGE_DEFAULT_FORGE_YAML: ${FORGE_DEFAULT_FORGE_YAML:-forge.yaml}
      FORGE_BUILD_TIMEOUT_SECONDS: ${FORGE_BUILD_TIMEOUT_SECONDS:-600}
      FORGE_BUILD_MAX_CONCURRENCY: ${FORGE_BUILD_MAX_CONCURRENCY:-2}
      FORGE_BUILD_LOG_BUFFER_LINES: ${FORGE_BUILD_LOG_BUFFER_LINES:-5000}
      FORGE_REGISTRY: ${FORGE_REGISTRY:-localhost:5000}
      FORGE_IMAGE_NAME_PATTERN: ${FORGE_IMAGE_NAME_PATTERN:-{project}-{service}}
      FORGE_DEFAULT_PROJECT: ${FORGE_DEFAULT_PROJECT:-}
      FORGE_PUSH_LATEST: ${FORGE_PUSH_LATEST:-true}
      FORGE_PUSH_RETRIES: ${FORGE_PUSH_RETRIES:-3}
      FORGE_CONTROL_URL: ${FORGE_CONTROL_URL:-http://forge-control:8080}
      FORGE_BUILD_AUTO_DEPLOY_DEFAULT: ${FORGE_BUILD_AUTO_DEPLOY_DEFAULT:-false}
      FORGE_CONTROL_RETRIES: ${FORGE_CONTROL_RETRIES:-5}
      FORGE_CONTROL_RETRY_BACKOFF_MS: ${FORGE_CONTROL_RETRY_BACKOFF_MS:-200}
      FORGE_CONTROL_TIMEOUT_SECONDS: ${FORGE_CONTROL_TIMEOUT_SECONDS:-10}
      FORGE_SHUTDOWN_GRACE_SECONDS: ${FORGE_SHUTDOWN_GRACE_SECONDS:-10}
      FORGE_DOCKER_STARTUP_RETRIES: ${FORGE_DOCKER_STARTUP_RETRIES:-5}
      FORGE_DOCKER_STARTUP_RETRY_DELAY_MS: ${FORGE_DOCKER_STARTUP_RETRY_DELAY_MS:-500}
    volumes:
      # Privileged local-dev mount — grants broad host control; harden later.
      - /var/run/docker.sock:/var/run/docker.sock
      - forge-build-workspace:/workspace
      - forge-build-store:/var/lib/forge-build
      # Local fixture Git repos for build smoke tests / demos (init via Makefile / demo run.sh).
      - ./services/forge-build/testdata/app:/fixtures/app
      - ./demos/06-source-to-deployment/fixture:/fixtures/demo
      - ./demos/06-source-to-deployment/fixture-broken:/fixtures/demo-broken
    # Socket is typically root:root mode 660 inside the container on Docker Desktop.
    # Run as root for this privileged local-dev mount (documented; harden later).
    user: "0:0"
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      registry:
        condition: service_healthy
      forge-control:
        condition: service_healthy
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  forge-postgres-data:
  forge-nats-data:
  forge-registry-data:
  forge-prometheus-data:
  forge-tempo-data:
  forge-loki-data:
  forge-grafana-data:
  forge-runtime-data:
  forge-build-workspace:
  forge-build-store:
