server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health/live {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location = /health/ready {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
