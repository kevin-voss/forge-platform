# Demo 13 — Forge Storage acceptance gate (standalone).
# Fresh named volume; host port 4107. Demo-only signing key (not a secret).
#
#   docker compose -f demos/13-object-storage/compose.yaml up -d --build

name: forge-demo-13

services:
  forge-storage:
    build:
      context: ../../services/forge-storage
    image: forge/forge-storage:local
    container_name: forge-demo-13-storage
    ports:
      - "4107:8080"
    environment:
      PORT: "8080"
      FORGE_SERVICE_NAME: forge-storage
      FORGE_SERVICE_VERSION: 0.1.0
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-info}
      FORGE_ENV: development
      FORGE_SHUTDOWN_GRACE_SECONDS: "10"
      FORGE_STORAGE_ROOT: /data/storage
      FORGE_STORAGE_ALLOWED_BASE: /data
      FORGE_STORAGE_META_PATH: /data/storage/meta/index.db
      FORGE_STORAGE_STREAM_BUFFER_BYTES: "65536"
      FORGE_STORAGE_SIGNING_KEY: ${FORGE_STORAGE_SIGNING_KEY:-demo-13-signing-key-not-a-secret}
      FORGE_STORAGE_MAX_TTL_SECONDS: ${FORGE_STORAGE_MAX_TTL_SECONDS:-3600}
      # Zero skew so ttl=1s + short sleep yields token_expired in the demo window.
      FORGE_STORAGE_CLOCK_SKEW_SECONDS: ${FORGE_STORAGE_CLOCK_SKEW_SECONDS:-0}
      FORGE_STORAGE_DEFAULT_QUOTA_BYTES: ${FORGE_STORAGE_DEFAULT_QUOTA_BYTES:-1073741824}
      FORGE_STORAGE_RECONCILE_ON_BOOT: "true"
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
    volumes:
      - storage-data:/data/storage
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/ready | grep -q ready"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 15s

  # Optional in-network client image (acceptance runs from the host via run.sh).
  runner:
    image: curlimages/curl:8.12.1
    container_name: forge-demo-13-runner
    depends_on:
      forge-storage:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]
    restart: "no"

volumes:
  storage-data:
