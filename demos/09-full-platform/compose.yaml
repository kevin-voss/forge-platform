# Capstone overlay — platform + product fixture mounts for Forge Build.
# Used with the root compose file:
#   docker compose -f compose.yaml -f demos/09-full-platform/compose.yaml --project-directory . up -d ...
#
# Auth: FORGE_AUTH_MODE=enforce (Identity). Secrets master key + Control SA
# are generated per run by setup-foundations.sh / deploy.sh.
# Events: includes the `incident` stream family for product incident.created events.

services:
  forge-gateway:
    environment:
      # Pattern is set by deploy.sh (brace placeholders break ${VAR:-default} parsing).
      FORGE_HOST_PATTERN: "${FORGE_HOST_PATTERN}"
      FORGE_ROUTE_SYNC_INTERVAL_SECONDS: ${FORGE_ROUTE_SYNC_INTERVAL_SECONDS:-3}
      FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS: ${FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS:-2}
      FORGE_UPSTREAM_FAILURE_THRESHOLD: ${FORGE_UPSTREAM_FAILURE_THRESHOLD:-1}
      FORGE_UPSTREAM_SUCCESS_THRESHOLD: ${FORGE_UPSTREAM_SUCCESS_THRESHOLD:-1}
      # Gateway edge auth is still largely advisory; product enforces Identity itself.
      FORGE_AUTH_MODE: ${FORGE_GATEWAY_AUTH_MODE:-dev}
      FORGE_OTEL_ENABLED: "true"
      FORGE_OTEL_EXPORTER_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}

  forge-identity:
    environment:
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-2}

  forge-secrets:
    environment:
      FORGE_AUTH_MODE: enforce
      FORGE_IDENTITY_URL: http://forge-identity:8080
      FORGE_SECRETS_MASTER_KEY: ${FORGE_SECRETS_MASTER_KEY:?FORGE_SECRETS_MASTER_KEY required for capstone}
      FORGE_SECRETS_MASTER_KEY_ID: ${FORGE_SECRETS_MASTER_KEY_ID:-capstone-m1}
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-2}
    depends_on:
      postgres:
        condition: service_healthy
      forge-identity:
        condition: service_healthy

  forge-control:
    environment:
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-enforce}
      FORGE_IDENTITY_URL: http://forge-identity:8080
      FORGE_SECRETS_URL: http://forge-secrets:8080
      FORGE_SECRETS_SERVICE_ACCOUNT: ${FORGE_SECRETS_SERVICE_ACCOUNT:-}
      FORGE_INJECT_MASK_IN_LOGS: ${FORGE_INJECT_MASK_IN_LOGS:-true}
      FORGE_INTROSPECT_CACHE_TTL_S: ${FORGE_INTROSPECT_CACHE_TTL_S:-2}
      FORGE_AUTHZ_CACHE_TTL_S: ${FORGE_AUTHZ_CACHE_TTL_S:-2}
      FORGE_RECONCILE_INTERVAL_SECONDS: ${FORGE_RECONCILE_INTERVAL_SECONDS:-3}
      FORGE_LIFECYCLE_OWNER: ${FORGE_LIFECYCLE_OWNER:-control}
      FORGE_RUNTIME_URL: http://forge-runtime:8080
      FORGE_SCHEDULER_ENABLED: "false"
      FORGE_OTEL_ENABLED: "true"
      FORGE_OTEL_EXPORTER_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Dsun.net.inetaddr.negative.ttl=0}
      # LocalProvisioner: isolated Postgres per product instance.
      FORGE_DB_PROVISIONER: ${FORGE_DB_PROVISIONER:-local}
      FORGE_DB_MANAGED_NETWORK: ${FORGE_DB_MANAGED_NETWORK:-forge-net}
      FORGE_DB_POSTGRES_IMAGE: ${FORGE_DB_POSTGRES_IMAGE:-postgres:16}
      FORGE_DB_ENDPOINT_HOST: ${FORGE_DB_ENDPOINT_HOST:-host.docker.internal}
      FORGE_DB_DEFAULT_ENV_VAR: DATABASE_URL
      FORGE_DB_BACKUP_TARGET: volume
      FORGE_DB_BACKUP_DIR: /var/forge/db-backups
      FORGE_DB_ROTATION_GRACE_SECONDS: ${FORGE_DB_ROTATION_GRACE_SECONDS:-5}
      FORGE_DB_PREDELETE_BACKUP: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - forge-capstone-db-backups:/var/forge/db-backups
    # LocalProvisioner shells out to docker CLI against the mounted socket.
    user: "0:0"
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      postgres:
        condition: service_healthy
      forge-identity:
        condition: service_healthy
      forge-secrets:
        condition: service_healthy

  forge-runtime:
    environment:
      FORGE_AUTH_MODE: dev
      FORGE_LIFECYCLE_OWNER: ${FORGE_LIFECYCLE_OWNER:-control}
      FORGE_PROBE_INTERVAL_SECONDS: ${FORGE_PROBE_INTERVAL_SECONDS:-2}
      FORGE_PROBE_FAILURE_THRESHOLD: ${FORGE_PROBE_FAILURE_THRESHOLD:-2}
      FORGE_OTEL_ENABLED: "true"
      FORGE_OTEL_EXPORTER_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  forge-build:
    environment:
      # Build agent auth stays local-dev; Control mutations use enforce + PATs.
      FORGE_AUTH_MODE: ${FORGE_BUILD_AUTH_MODE:-dev}
      FORGE_BUILD_TIMEOUT_SECONDS: ${FORGE_BUILD_TIMEOUT_SECONDS:-1200}
      FORGE_BUILD_MAX_CONCURRENCY: ${FORGE_BUILD_MAX_CONCURRENCY:-2}
      FORGE_BUILD_AUTO_DEPLOY_DEFAULT: "false"
      FORGE_OTEL_ENABLED: "true"
      FORGE_OTEL_EXPORTER_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${FORGE_OTEL_EXPORTER_ENDPOINT:-http://otel-collector:4317}
    volumes:
      - ./demos/09-full-platform/product/api-go:/fixtures/product/api-go
      - ./demos/09-full-platform/product/admin-kotlin:/fixtures/product/admin-kotlin
      - ./demos/09-full-platform/product/log-worker-rust:/fixtures/product/log-worker-rust
      - ./demos/09-full-platform/product/classify-python:/fixtures/product/classify-python
      - ./demos/09-full-platform/product/notify-elixir:/fixtures/product/notify-elixir

  forge-events:
    environment:
      FORGE_AUTH_MODE: ${FORGE_EVENTS_AUTH_MODE:-dev}
      FORGE_EVENTS_STREAMS: ${FORGE_EVENTS_STREAMS:-build,deployment,runtime,application,agent,incident}
      FORGE_SCHEMA_VALIDATION: ${FORGE_SCHEMA_VALIDATION:-strict}
      FORGE_DEFAULT_ACK_WAIT_S: ${FORGE_DEFAULT_ACK_WAIT_S:-5}
      FORGE_DEFAULT_MAX_DELIVERIES: ${FORGE_DEFAULT_MAX_DELIVERIES:-3}
      FORGE_CONSUME_WAIT_MS: ${FORGE_CONSUME_WAIT_MS:-1000}

  forge-observe:
    environment:
      FORGE_AUTH_MODE: ${FORGE_OBSERVE_AUTH_MODE:-dev}
      FORGE_ALERT_ERROR_RATE_THRESHOLD: ${FORGE_ALERT_ERROR_RATE_THRESHOLD:-0.05}
      FORGE_ALERT_ERROR_RATE_FOR: ${FORGE_ALERT_ERROR_RATE_FOR:-10s}

  forge-storage:
    environment:
      # Product uses project-scoped X-Forge-Project (demo 13 pattern).
      FORGE_AUTH_MODE: ${FORGE_STORAGE_AUTH_MODE:-dev}
      FORGE_STORAGE_SIGNING_KEY: ${FORGE_STORAGE_SIGNING_KEY:-capstone-storage-signing-key}

  # 19.04 — Models / Agents / Memory for incident diagnosis (fake in CI).
  forge-models:
    environment:
      FORGE_MODELS_BACKEND: ${FORGE_MODELS_BACKEND:-fake}

  forge-memory:
    environment:
      FORGE_AUTH_MODE: ${FORGE_MEMORY_AUTH_MODE:-dev}
      FORGE_MODELS_URL: http://forge-models:8080
      FORGE_MEMORY_DEFAULT_MODEL: ${FORGE_MEMORY_DEFAULT_MODEL:-local-embed-small}
    depends_on:
      forge-models:
        condition: service_healthy

  forge-agents:
    environment:
      FORGE_MODELS_URL: http://forge-models:8080
      FORGE_MEMORY_URL: http://forge-memory:8080
      # Absolute http(s) URLs only (host env may set FORGE_EVENTS_URL to nats://).
      FORGE_CONTROL_URL: http://forge-control:4001
      FORGE_RUNTIME_URL: http://forge-runtime:4102
      FORGE_OBSERVE_URL: http://forge-observe:4106
      FORGE_STORAGE_URL: http://forge-storage:4107
      FORGE_EVENTS_URL: http://forge-events:4105
      # Capstone prefers live against platform; CI/fake fallback via env.
      FORGE_AGENTS_TOOLS_MODE: ${FORGE_AGENTS_TOOLS_MODE:-fake}
      FORGE_AGENTS_DEFS_DIR: /app/agents
    volumes:
      # Capstone investigator includes memory.search (+ approval-gated restart).
      - ./demos/09-full-platform/ai/deployment-investigator.yaml:/app/agents/deployment-investigator.yaml:ro
      - ./demos/09-full-platform/ai/fixtures/memory.search.json:/app/app/tools/fixtures/memory.search.json:ro
      - ./demos/09-full-platform/ai/fixtures/deployment.read.json:/app/app/tools/fixtures/deployment.read.json:ro
      - ./demos/09-full-platform/ai/fixtures/logs.search.json:/app/app/tools/fixtures/logs.search.json:ro
      - ./demos/09-full-platform/ai/fixtures/metrics.query.json:/app/app/tools/fixtures/metrics.query.json:ro
    depends_on:
      forge-models:
        condition: service_healthy
      forge-memory:
        condition: service_healthy

  # 19.05 — Workflows incident-response (approval-gated Control rollback).
  forge-workflows:
    environment:
      FORGE_WORKFLOWS_DEFS_DIR: /app/definitions
      FORGE_AGENTS_URL: http://forge-agents:8080
      FORGE_CONTROL_URL: http://forge-control:4001
      FORGE_EVENTS_URL: http://forge-events:4105
      FORGE_WORKFLOWS_EVENTS_ENABLED: ${FORGE_WORKFLOWS_EVENTS_ENABLED:-false}
      FORGE_WORKFLOWS_AGENTS_MODE: ${FORGE_WORKFLOWS_AGENTS_MODE:-fake}
      FORGE_WORKFLOWS_CONTROL_MODE: ${FORGE_WORKFLOWS_CONTROL_MODE:-fake}
      FORGE_WORKFLOWS_AGENT_POLL_MS: ${FORGE_WORKFLOWS_AGENT_POLL_MS:-50}
      FORGE_WORKFLOWS_AGENT_STEP_TIMEOUT: ${FORGE_WORKFLOWS_AGENT_STEP_TIMEOUT:-30000}
      FORGE_WORKFLOWS_APPROVAL_TTL_SECONDS: ${FORGE_WORKFLOWS_APPROVAL_TTL_SECONDS:-86400}
      FORGE_WORKFLOWS_DEFAULT_PROJECT: ${FORGE_WORKFLOWS_DEFAULT_PROJECT:-capstone}
      FORGE_WORKFLOWS_REPORT_BUCKET: ${FORGE_WORKFLOWS_REPORT_BUCKET:-wf-reports}
      FORGE_WORKFLOWS_CONTROL_HTTP_TIMEOUT_MS: ${FORGE_WORKFLOWS_CONTROL_HTTP_TIMEOUT_MS:-2000}
    volumes:
      - ./demos/09-full-platform/scenario:/app/definitions:ro
    depends_on:
      postgres:
        condition: service_healthy
      forge-agents:
        condition: service_healthy

volumes:
  forge-capstone-db-backups:
