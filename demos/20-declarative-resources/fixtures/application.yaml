# Portable Application stack for demo 20 (placeholders filled by run.sh).
# No provider-specific fields — image, resources, and scaling only.
apiVersion: forge.dev/v1
kind: Project
metadata:
  name: ${PROJECT_NAME}
spec:
  slug: ${PROJECT_SLUG}
---
apiVersion: forge.dev/v1
kind: Environment
metadata:
  name: production
  project: ${PROJECT_SLUG}
spec: {}
---
apiVersion: forge.dev/v1
kind: Application
metadata:
  name: invoice-api
  project: ${PROJECT_SLUG}
  environment: production
  labels:
    app: invoice-api
    tier: api
    demo: "20"
spec:
  image: ${IMAGE_V1}
  resources:
    cpu: 100m
    memory: 128Mi
  scaling:
    minReplicas: 1
    maxReplicas: 1
---
apiVersion: forge.dev/v1
kind: Service
metadata:
  name: invoice-api
  project: ${PROJECT_SLUG}
  annotations:
    forge.dev/parent: invoice-api
spec:
  port: 8080
---
apiVersion: forge.dev/v1
kind: Deployment
metadata:
  name: invoice-api
  project: ${PROJECT_SLUG}
  environment: production
  annotations:
    forge.dev/parent: invoice-api
  labels:
    app: invoice-api
    demo: "20"
spec:
  service: invoice-api
  image: ${IMAGE_V1}
  replicas: 1
