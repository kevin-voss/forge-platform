# Demo 20 overlay — auth bypass + faster reconcile for the declarative gate.
# Used with the root compose file:
#   docker compose -f compose.yaml -f demos/20-declarative-resources/docker-compose.yml up -d ...

services:
  forge-control:
    environment:
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      FORGE_RECONCILE_INTERVAL_MS: ${FORGE_RECONCILE_INTERVAL_MS:-1000}
      FORGE_READINESS_POLL_MS: ${FORGE_READINESS_POLL_MS:-500}
      FORGE_READINESS_MAX_WAIT_S: ${FORGE_READINESS_MAX_WAIT_S:-90}
      FORGE_ROLLOUT_TIMEOUT_S: ${FORGE_ROLLOUT_TIMEOUT_S:-180}
      FORGE_ROLLOUT_BATCH_SIZE: ${FORGE_ROLLOUT_BATCH_SIZE:-1}
      FORGE_RESOURCE_API_ENABLED: ${FORGE_RESOURCE_API_ENABLED:-true}
      # Single-node placement — avoid pending_placement when the fleet is empty/full.
      FORGE_SCHEDULER_STRATEGY: ${FORGE_SCHEDULER_STRATEGY:-single-node}
      FORGE_SCHEDULER_LOCAL_NODE_ID: ${FORGE_SCHEDULER_LOCAL_NODE_ID:-node-local}
      # Demo does not bind secrets; 'disabled' → NoOpSecretsClient (avoid 401 holds).
      FORGE_SECRETS_URL: ${FORGE_SECRETS_URL:-disabled}
  forge-runtime:
    environment:
      FORGE_PROBE_INTERVAL_SECONDS: ${FORGE_PROBE_INTERVAL_SECONDS:-2}
      FORGE_PROBE_FAILURE_THRESHOLD: ${FORGE_PROBE_FAILURE_THRESHOLD:-2}
      FORGE_STOP_GRACE_SECONDS: ${FORGE_STOP_GRACE_SECONDS:-2}
