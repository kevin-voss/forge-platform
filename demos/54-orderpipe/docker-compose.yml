# Demo 54 overlay — OrderPipe + managed Postgres + Discovery + NetworkPolicy +
# Events + Workflows + Secrets (epic 54.05). Used with the root compose file:
#   docker compose -f compose.yaml -f demos/54-orderpipe/docker-compose.yml up -d ...
#
# Host pattern yields shop/api/fulfillment/notify.orderpipe.localhost for services
# named `shop`, `api`, `fulfillment`, and `notify`. LocalProvisioner starts isolated
# product Postgres containers; DATABASE_URL is injected via Control's in-memory
# secrets client while FORGE_SECRETS_URL=disabled (PSP_API_KEY is applied via
# Application env + provisioned into forge-secrets for the Secrets proof).
#
# Discovery: Runtime registers leases; run.sh also registers canonical service
# names (fulfillment/notify/api) under project=orderpipe so peers resolve via
# *.svc.forge (Ready-aware).
#
# Network: forge-network applies orderpipe-mesh NetworkPolicy (deny-all default +
# allow order-api→fulfillment / order-api→notify). Runtime keeps the fake policy
# backend for local compose (observable denies via /network-policy-denied).
#
# Events: forge-events includes the `order` stream family for order.* subjects.
# Workflows: mounts demos/54-orderpipe/definitions (order-saga). Secrets: auth=dev.

services:
  forge-secrets:
    environment:
      FORGE_AUTH_MODE: ${FORGE_SECRETS_AUTH_MODE:-dev}
      FORGE_SECRETS_MASTER_KEY: ${FORGE_SECRETS_MASTER_KEY:-bG9jYWwtZGV2LWZvcmdlLXNlY3JldHMta2V5ISEhISE=}
      FORGE_SECRETS_MASTER_KEY_ID: ${FORGE_SECRETS_MASTER_KEY_ID:-demo-m54}

  forge-workflows:
    environment:
      FORGE_WORKFLOWS_DEFS_DIR: /app/definitions
      # Keep false until orderpipe.* HTTP actions exist (F-008); listing still works.
      FORGE_WORKFLOWS_EVENTS_ENABLED: ${FORGE_WORKFLOWS_EVENTS_ENABLED:-false}
      FORGE_EVENTS_URL: ${FORGE_EVENTS_URL:-http://forge-events:4105}
      FORGE_WORKFLOWS_DEFAULT_PROJECT: ${FORGE_WORKFLOWS_DEFAULT_PROJECT:-orderpipe}
      FORGE_WORKFLOWS_CONTROL_MODE: ${FORGE_WORKFLOWS_CONTROL_MODE:-fake}
      FORGE_WORKFLOWS_AGENTS_MODE: ${FORGE_WORKFLOWS_AGENTS_MODE:-fake}
    volumes:
      # Path is relative to compose --project-directory (repo root).
      - ./demos/54-orderpipe/definitions/order-saga.yaml:/app/definitions/order-saga.yaml:ro

  forge-events:
    environment:
      FORGE_AUTH_MODE: ${FORGE_EVENTS_AUTH_MODE:-dev}
      FORGE_EVENTS_STREAMS: ${FORGE_EVENTS_STREAMS:-build,deployment,runtime,application,agent,order}
      FORGE_DEFAULT_ACK_WAIT_S: ${FORGE_DEFAULT_ACK_WAIT_S:-10}
      FORGE_DEFAULT_MAX_DELIVERIES: ${FORGE_DEFAULT_MAX_DELIVERIES:-5}
      FORGE_ACK_TOKEN_TTL_S: ${FORGE_ACK_TOKEN_TTL_S:-30}
      FORGE_DEDUP_WINDOW_S: ${FORGE_DEDUP_WINDOW_S:-120}
      FORGE_CONSUME_WAIT_MS: ${FORGE_CONSUME_WAIT_MS:-1000}
      FORGE_DLQ_ENABLED: "true"
      FORGE_SCHEMA_VALIDATION: strict

  forge-network:
    environment:
      FORGE_NETWORK_POLICY_DEFAULT: ${FORGE_NETWORK_POLICY_DEFAULT:-allow-within-environment}
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-false}

  forge-control:
    environment:
      FORGE_AUTH_MODE: ${FORGE_AUTH_MODE:-dev}
      FORGE_LIFECYCLE_OWNER: ${FORGE_LIFECYCLE_OWNER:-control}
      FORGE_RECONCILE_INTERVAL_MS: ${FORGE_RECONCILE_INTERVAL_MS:-1000}
      FORGE_READINESS_POLL_MS: ${FORGE_READINESS_POLL_MS:-500}
      FORGE_READINESS_MAX_WAIT_S: ${FORGE_READINESS_MAX_WAIT_S:-90}
      FORGE_RESOURCE_API_ENABLED: ${FORGE_RESOURCE_API_ENABLED:-true}
      FORGE_SECRETS_URL: ${FORGE_SECRETS_URL:-disabled}
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-false}
      # Pin to local runtime so leftover offline HA nodes (demo 25) cannot steal placement.
      FORGE_SCHEDULER_STRATEGY: ${FORGE_SCHEDULER_STRATEGY:-single-node}
      FORGE_SCHEDULER_LOCAL_NODE_ID: ${FORGE_SCHEDULER_LOCAL_NODE_ID:-node-local}
      # Managed Postgres (LocalProvisioner).
      FORGE_DB_PROVISIONER: ${FORGE_DB_PROVISIONER:-local}
      FORGE_DB_MANAGED_NETWORK: ${FORGE_DB_MANAGED_NETWORK:-forge-net}
      FORGE_DB_POSTGRES_IMAGE: ${FORGE_DB_POSTGRES_IMAGE:-postgres:16}
      FORGE_DB_ENDPOINT_HOST: ${FORGE_DB_ENDPOINT_HOST:-host.docker.internal}
      FORGE_DB_DEFAULT_ENV_VAR: DATABASE_URL
      FORGE_DB_BACKUP_TARGET: volume
      FORGE_DB_BACKUP_DIR: /var/forge/db-backups
      FORGE_INJECT_MASK_IN_LOGS: ${FORGE_INJECT_MASK_IN_LOGS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - forge-demo54-db-backups:/var/forge/db-backups
    # LocalProvisioner shells out to docker CLI against the mounted socket.
    user: "0:0"
    group_add:
      - "${DOCKER_GID:-0}"

  forge-discovery:
    environment:
      FORGE_DISCOVERY_LEASE_SECONDS_DEFAULT: ${FORGE_DISCOVERY_LEASE_SECONDS_DEFAULT:-20}
      FORGE_DISCOVERY_SWEEP_INTERVAL_SECONDS: ${FORGE_DISCOVERY_SWEEP_INTERVAL_SECONDS:-5}
      FORGE_DISCOVERY_DNS_TTL_SECONDS: ${FORGE_DISCOVERY_DNS_TTL_SECONDS:-5}
      FORGE_DISCOVERY_DNS_NEGATIVE_TTL_SECONDS: ${FORGE_DISCOVERY_DNS_NEGATIVE_TTL_SECONDS:-2}
      # Docker IPs are fine for single-node OrderPipe; leave overlay filter off.
      FORGE_NETWORK_URL: ${FORGE_DISCOVERY_NETWORK_URL:-}
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-false}

  forge-runtime:
    environment:
      FORGE_DISCOVERY_URL: ${FORGE_DISCOVERY_URL:-http://forge-discovery:8080}
      FORGE_DISCOVERY_REGISTER_ENABLED: ${FORGE_DISCOVERY_REGISTER_ENABLED:-true}
      FORGE_DISCOVERY_LEASE_SECONDS: ${FORGE_DISCOVERY_LEASE_SECONDS:-20}
      FORGE_DISCOVERY_DEFAULT_PROJECT: ${FORGE_DISCOVERY_DEFAULT_PROJECT:-orderpipe}
      FORGE_DISCOVERY_DEFAULT_ENVIRONMENT: ${FORGE_DISCOVERY_DEFAULT_ENVIRONMENT:-local}
      FORGE_NETWORK_URL: ${FORGE_NETWORK_URL:-http://forge-network:8080}
      FORGE_NETWORK_NAME: ${FORGE_NETWORK_NAME:-cluster-overlay}
      FORGE_NETWORK_DNS_SEARCH: ${FORGE_NETWORK_DNS_SEARCH:-local.orderpipe.svc.forge}
      FORGE_NETWORK_POLICY_BACKEND: ${FORGE_NETWORK_POLICY_BACKEND:-fake}
      FORGE_NETWORK_POLICY_POLL_INTERVAL_S: ${FORGE_NETWORK_POLICY_POLL_INTERVAL_S:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 172.30.0.53

  forge-gateway:
    environment:
      # Quoted so Compose does not treat {service} as interpolation.
      FORGE_HOST_PATTERN: "{service}.orderpipe.localhost"
      FORGE_ROUTE_SYNC_INTERVAL_SECONDS: ${FORGE_ROUTE_SYNC_INTERVAL_SECONDS:-2}
      FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS: ${FORGE_UPSTREAM_PROBE_INTERVAL_SECONDS:-2}
      FORGE_UPSTREAM_FAILURE_THRESHOLD: ${FORGE_UPSTREAM_FAILURE_THRESHOLD:-1}
      FORGE_UPSTREAM_SUCCESS_THRESHOLD: ${FORGE_UPSTREAM_SUCCESS_THRESHOLD:-1}
      FORGE_UPSTREAM_TRUST_RUNTIME_STATUS: "true"

volumes:
  forge-demo54-db-backups:
