# Demo 55 Prometheus — scrapes PulseBoard Observe metrics sidecar so Grafana
# panels match dashboard /stats (same series the API queries via Observe).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: demo55-pulseboard-observe
    metrics_path: /metrics
    static_configs:
      - targets: ["demo55-metrics:8080"]
        labels:
          demo: "55"
          service: pulseboard-api
