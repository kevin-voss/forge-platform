# SnapNote build manifests + portable resource docs (epic 52.01).
#
# Build (read by `forge build` when available; run.sh also docker-builds locally):
#   api/forge.yaml  → snapnote-api
#   web build uses Dockerfile.web at repo root of this demo
#
# Applied by run.sh via `forge apply -f` (placeholders filled at deploy time).

apiVersion: forge.dev/v1
kind: Project
metadata:
  name: ${PROJECT_NAME}
spec:
  slug: ${PROJECT_SLUG}
---
apiVersion: forge.dev/v1
kind: Environment
metadata:
  name: local
  project: ${PROJECT_SLUG}
spec: {}
---
apiVersion: forge.dev/v1
kind: Application
metadata:
  name: snapnote-api
  project: ${PROJECT_SLUG}
  environment: local
  labels:
    app: snapnote-api
    demo: "52"
spec:
  image: ${API_IMAGE}
  resources:
    cpu: 50m
    memory: 64Mi
  scaling:
    minReplicas: 1
    maxReplicas: 1
  # Typed managed Postgres dependency (materialized by run.sh via forge database).
  # DATABASE_URL is injected as plaintext env from the in-memory secrets client
  # when FORGE_SECRETS_URL=disabled (Secrets product path is TaskFlow's job).
  # Object storage (52.02) + durable queue (52.03): wired via image env + run.sh.
  dependencies:
    database:
      type: postgres
      plan: standard
      name: snapnote-db
    storage:
      type: object
      bucket: snapnote-attachments
    queue:
      type: durable
      name: snapnote-attachments
---
apiVersion: forge.dev/v1
kind: Service
metadata:
  name: api
  project: ${PROJECT_SLUG}
  annotations:
    forge.dev/parent: snapnote-api
spec:
  port: 8080
---
apiVersion: forge.dev/v1
kind: Deployment
metadata:
  name: snapnote-api
  project: ${PROJECT_SLUG}
  environment: local
  annotations:
    forge.dev/parent: snapnote-api
  labels:
    app: snapnote-api
    demo: "52"
spec:
  service: api
  image: ${API_IMAGE}
  replicas: 1
---
# snapnote-worker — Application/Service/Deployment stand-in for kind: Worker
# (see worker/worker.yaml). Bounds match ScalingPolicy (52.04); desiredReplicas
# start at 1 and are driven by forge-autoscaler queueDepth.
apiVersion: forge.dev/v1
kind: Application
metadata:
  name: snapnote-worker
  project: ${PROJECT_SLUG}
  environment: local
  labels:
    app: snapnote-worker
    demo: "52"
spec:
  image: ${WORKER_IMAGE}
  resources:
    cpu: 50m
    memory: 64Mi
  scaling:
    minReplicas: 1
    maxReplicas: 8
    desiredReplicas: 1
  dependencies:
    database:
      type: postgres
      plan: standard
      name: snapnote-db
    storage:
      type: object
      bucket: snapnote-attachments
    queue:
      type: durable
      name: snapnote-attachments
---
apiVersion: forge.dev/v1
kind: Service
metadata:
  name: worker
  project: ${PROJECT_SLUG}
  annotations:
    forge.dev/parent: snapnote-worker
spec:
  port: 8080
---
apiVersion: forge.dev/v1
kind: Deployment
metadata:
  name: snapnote-worker
  project: ${PROJECT_SLUG}
  environment: local
  annotations:
    forge.dev/parent: snapnote-worker
  labels:
    app: snapnote-worker
    demo: "52"
spec:
  service: worker
  image: ${WORKER_IMAGE}
  replicas: 1
---
apiVersion: forge.dev/v1
kind: Application
metadata:
  name: snapnote-web
  project: ${PROJECT_SLUG}
  environment: local
  labels:
    app: snapnote-web
    demo: "52"
spec:
  image: ${WEB_IMAGE}
  resources:
    cpu: 50m
    memory: 64Mi
  scaling:
    minReplicas: 1
    maxReplicas: 1
---
apiVersion: forge.dev/v1
kind: Service
metadata:
  name: app
  project: ${PROJECT_SLUG}
  annotations:
    forge.dev/parent: snapnote-web
spec:
  port: 8080
---
apiVersion: forge.dev/v1
kind: Deployment
metadata:
  name: snapnote-web
  project: ${PROJECT_SLUG}
  environment: local
  annotations:
    forge.dev/parent: snapnote-web
  labels:
    app: snapnote-web
    demo: "52"
spec:
  service: app
  image: ${WEB_IMAGE}
  replicas: 1
