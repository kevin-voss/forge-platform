# Portable Worker resource doc for SnapNote (epic 52.04).
# Control registers kind: Worker; run.sh creates this resource and a companion
# Application/Service/Deployment (see ../forge.yaml). forge-autoscaler patches
# spec.scaling.desiredReplicas from ScalingPolicy queueDepth
# (fixtures/scaling-policy.yaml).
#
# Logical queue name snapnote-attachments maps to forge-events:
#   subject:  attachment.uploaded
#   consumer: snapnote-attachments

apiVersion: forge.dev/v1
kind: Worker
metadata:
  name: snapnote-worker
  project: ${PROJECT_SLUG}
  environment: local
  labels:
    app: snapnote-worker
    demo: "52"
spec:
  image: ${WORKER_IMAGE}
  consumes:
    queue: snapnote-attachments
  scaling:
    minReplicas: 1
    maxReplicas: 8
    desiredReplicas: 1
  dependencies:
    database:
      type: postgres
      plan: standard
      name: snapnote-db
    storage:
      type: object
      bucket: snapnote-attachments
    queue:
      type: durable
      name: snapnote-attachments
